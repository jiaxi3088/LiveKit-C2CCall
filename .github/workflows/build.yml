name: Build LiveKit-C2CCall Native Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir yet"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-34" "build-tools;34.0.0"
          echo "Installed platforms:"
          ls "$ANDROID_HOME/platforms/"

      - name: Create uni-app SDK stub AAR
        run: |
          set -e
          STUB_DIR=ci-stubs/build
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          
          echo "=== Android JAR check ==="
          ls -la "$ANDROID_JAR"
          
          mkdir -p $STUB_DIR/classes
          
          echo "=== Compiling stub sources ==="
          javac -d $STUB_DIR/classes \
            -source 17 -target 17 \
            -cp "$ANDROID_JAR" \
            ci-stubs/android/*.java
          
          echo "=== Creating classes.jar ==="
          (cd $STUB_DIR/classes && jar cf ../classes.jar .)
          
          echo "=== Creating stub AAR ==="
          mkdir -p $STUB_DIR/aar
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="io.dcloud.feature.uniapp"/>' > $STUB_DIR/aar/AndroidManifest.xml
          cp $STUB_DIR/classes.jar $STUB_DIR/aar/classes.jar
          (cd $STUB_DIR/aar && jar cf ../../uniapp-v8-release.aar .)
          
          mkdir -p libs
          cp ci-stubs/uniapp-v8-release.aar libs/
          
          echo "=== Stub AAR created successfully ==="

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate Gradle Wrapper (fix incomplete JAR)
        working-directory: android
        run: |
          echo "=== Checking gradlew wrapper ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "Wrapper files missing"
          # Use system Gradle to regenerate a correct wrapper
          gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          chmod +x gradlew
          echo "=== Regenerated wrapper ==="
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Build Android AAR
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== Build output ==="
          ls -la build/outputs/aar/ 2>/dev/null || { echo "ERROR: No AAR output directory found!"; exit 1; }
          if [ ! -f build/outputs/aar/*-release.aar ]; then
            echo "=== BUILD FAILED - No AAR found ==="
            tail -80 build.log
            exit 1
          fi
          echo "AAR file(s):"
          ls -la build/outputs/aar/*-release.aar

      - name: Create Fat AAR (merge all dependencies)
        working-directory: android
        run: |
          set -e

          # ====== 全部使用绝对路径，避免 cd 导致路径混乱 ======
          ANDROID_ROOT="$(pwd)"
          WORK="$ANDROID_ROOT/fat-aar-work"
          SRC_AAR="$(ls $ANDROID_ROOT/build/outputs/aar/*-release.aar | head -1)"
          
          echo "=== Android Root: $ANDROID_ROOT ==="
          echo "=== Source AAR: $(basename $SRC_AAR) ==="
          echo "=== Work dir:   $WORK ==="
          
          rm -rf "$WORK" && mkdir -p "$WORK"

          # ---- Step 1: 解压插件自身 AAR ----
          PLUGIN_EXTRACT="$WORK/plugin-extract"
          mkdir -p "$PLUGIN_EXTRACT"
          unzip -qo "$SRC_AAR" -d "$PLUGIN_EXTRACT"
          echo "[Step 1] ✓ Plugin AAR extracted"
          ls -la "$PLUGIN_EXTRACT/"

          # ---- Step 2: 用 Gradle 导出运行时依赖文件路径 ----
          DEPS_FILE="$WORK/deps-runtime.txt"
          DEPS_JARS="$WORK/deps-jars"
          DEPS_AARS="$WORK/deps-aars"
          mkdir -p "$DEPS_JARS" "$DEPS_AARS"
          
          echo ""
          echo "[Step 2] Running Gradle exportDeps..."
          ./gradlew :exportDeps --quiet 2>&1 || true
          
          # 使用 Gradle 导出的文件路径（每行一个绝对路径）
          if [ -f "$ANDROID_ROOT/build/exports/deps-runtime.txt" ] && [ -s "$ANDROID_ROOT/build/exports/deps-runtime.txt" ]; then
            cp "$ANDROID_ROOT/build/exports/deps-runtime.txt" "$DEPS_FILE"
            echo "[Step 2] ✓ Dependencies exported by Gradle task"
          else
            echo "[Step 2] ⚠ exportDeps failed or empty, using fallback list from Gradle cache"
            # Fallback: 用硬编码的 Maven 坐标列表从缓存搜索
            printf '%s\n' \
              "io.livekit:livekit-android:2.25.1" \
              "androidx.appcompat:appcompat:1.6.1" \
              "androidx.core:core-ktx:1.13.1" \
              "androidx.lifecycle:lifecycle-runtime-ktx:2.8.7" \
              "androidx.lifecycle:lifecycle-common:2.8.7" \
              "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1" \
              "org.jetbrains.kotlin:kotlin-stdlib:2.0.21" \
              "org.jetbrains.kotlinx:kotlinx-coroutines-core-jvm:1.8.1" \
              "com.google.code.gson:gson:2.11.0" \
              "com.squareup.okhttp3:okhttp:4.12.0" \
              "com.squareup.okio:okhttp-jvm:4.12.0" \
              "com.squareup.okio:okio:3.9.1" \
              > "$DEPS_FILE"
          fi

          echo "=== Runtime dependencies ($(wc -l < "$DEPS_FILE") lines) ==="
          cat -n "$DEPS_FILE"

          # ---- Step 2b: 收集依赖文件（支持绝对路径 或 Maven坐标） ----
          echo ""
          echo "[Step 2b] Collecting dependency artifacts..."
          GRADLE_CACHE="$HOME/.gradle/caches"
          TOTAL_FOUND=0

          while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            # 跳过注释行
            [[ "$dep" == __* ]] && continue

            # 判断是绝对路径还是 Maven 坐标
            if [ -f "$dep" ]; then
              # 直接是文件路径（来自 exportDeps）
              FOUND="$dep"
            else
              # Maven 坐标格式: groupId:artifactId:version
              GROUP=$(echo "$dep" | cut -d: -f1)
              ARTIFACT=$(echo "$dep" | cut -d: -f2)
              VERSION=$(echo "$dep" | cut -d: -f3)
              CACHE_SEARCH="${GROUP//\.//}/$ARTIFACT/$VERSION"

              # 从 Gradle modules cache 搜索
              FOUND=""
              for candidate_dir in \
                "$GRADLE_CACHE/modules-2/files-2.1/$CACHE_SEARCH" \
                "$GRADLE_CACHE/modules-2/files-$ARTIFACT/$CACHE_SEARCH"; do
                [ -d "$candidate_dir" ] || continue
                FOUND=$(find "$candidate_dir" -maxdepth 2 \( -name "*.jar" -o -name "*.aar" \) \
                  ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
                [ -n "$FOUND" ] && break
              done
              
              # 兜底：宽泛搜索
              if [ -z "$FOUND" ]; then
                FOUND=$(find "$GRADLE_CACHE" -path "*$ARTIFACT/$VERSION*" \
                  \( -name "${ARTIFACT}-${VERSION}.jar" -o -name "${ARTIFACT}-${VERSION}.aar" \
                   -o -name "${ARTIFACT}-*.jar" -o -name "${ARTIFACT}-*.aar" \) \
                  ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
              fi
            fi

            # 处理找到的文件
            if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
              case "$FOUND" in
                *.jar)
                  cp "$FOUND" "$DEPS_JARS/" 2>/dev/null
                  echo "  [JAR] $(basename "$FOUND") ($(du -h "$FOUND" | cut -f1))"
                  ;;
                *.aar)
                  DEP_BASE="$(basename "$FOUND" .aar)"
                  AAR_DIR="$DEPS_AARS/$DEP_BASE"
                  mkdir -p "$AAR_DIR"
                  unzip -qo "$FOUND" -d "$AAR_DIR" 2>/dev/null || true
                  if [ -f "$AAR_DIR/classes.jar" ] && [ ! -s "$AAR_DIR/classes.jar" ]; then
                    rm -f "$AAR_DIR/classes.jar"
                  fi
                  echo "  [AAR] $DEP_BASE ($(du -h "$FOUND" | cut -f1))"
                  ;;
              esac
              TOTAL_FOUND=$((TOTAL_FOUND+1))
            else
              echo "  [??]  $dep (未找到)"
            fi
          done < "$DEPS_FILE"
          
          echo ""
          echo "  找到: $TOTAL_FOUND, 未找到: $TOTAL_MISSING"
          echo "  JARs: $(ls "$DEPS_JARS/"*.jar 2>/dev/null | wc -l)"
          echo "  AARs: $(ls -d "$DEPS_AARS"/*/ 2>/dev/null | wc -l)"

          # ---- Step 3: 合并所有 classes.jar ----
          MERGED_CLASSES="$WORK/merged-classes"
          mkdir -p "$MERGED_CLASSES"
          echo ""
          echo "[Step 3] Merging all classes.jar..."

          # 合并插件自身
          if [ -f "$PLUGIN_EXTRACT/classes.jar" ]; then
            unzip -qo "$PLUGIN_EXTRACT/classes.jar" -d "$MERGED_CLASSES" 2>/dev/null || true
            echo "  ✓ plugin classes.jar ($(du -h "$PLUGIN_EXTRACT/classes.jar" | cut -f1))"
          else
            echo "  ⚠ plugin has no classes.jar (may be empty library)"
          fi

          # 合并依赖 JARs
          JCOUNT=0
          for jarfile in "$DEPS_JARS/"*.jar; do
            [ -f "$jarfile" ] || continue
            [ -s "$jarfile" ] || continue
            unzip -qo "$jarfile" -d "$MERGED_CLASSES" 2>/dev/null || true
            JCOUNT=$((JCOUNT+1))
          done
          echo "  ✓ $JCOUNT direct JARs merged"

          # 合并依赖 AAR 的 classes.jar
          ACOUNT=0
          for aardir in "$DEPS_AARS"/*/; do
            [ -d "$aardir" ] || continue
            CJAR="$aardir/classes.jar"
            if [ -f "$CJAR" ] && [ -s "$CJAR" ]; then
              unzip -qo "$CJAR" -d "$MERGED_CLASSES" 2>/dev/null || true
              ACOUNT=$((ACOUNT+1))
            fi
          done
          echo "  ✓ $ACOUNT AAR classes.jar merged"

          # 打包为合并后的 classes.jar（排除签名冲突）
          CLASSES_MERGED="$WORK/classes-merged.jar"
          echo "  Repacking → classes-merged.jar ..."
          (cd "$MERGED_CLASSES" && \
            rm -rf META-INF/*.SF META-INF/*.RSA META-INF/*.DSA META-INF/MANIFEST.MF 2>/dev/null; \
            jar cf "$CLASSES_MERGED" . )
          echo "  ✓ classes-merged.jar: $(du -h "$CLASSES_MERGED" | cut -f1)"

          # ---- Step 4: 收集所有 .so 原生库 ----
          JNI_OUT="$WORK/jni"
          mkdir -p "$JNI_OUT"
          echo ""
          echo "[Step 4] Collecting .so native libraries..."

          SO_TOTAL=0
          # 从依赖 AAR 中提取 .so
          for aardir in "$DEPS_AARS"/*/; do
            [ -d "$aardir" ] || continue
            if [ -d "$aardir/jni" ]; then
              (cd "$aardir/jni" && find . -name "*.so" 2>/dev/null | while read so_rel; do
                SO_SRC="$aardir/jni/$so_rel"
                SO_DST="$JNI_OUT/$so_rel"
                mkdir -p "$(dirname "$SO_DST")"
                cp "$SO_SRC" "$SO_DST" 2>/dev/null
              done) || true
            fi
          done
          # 从插件自身提取 .so（如果有）
          if [ -d "$PLUGIN_EXTRACT/jni" ]; then
            (cd "$PLUGIN_EXTRACT/jni" && find . -name "*.so" 2>/dev/null | while read so_rel; do
              SO_SRC="$PLUGIN_EXTRACT/jni/$so_rel"
              SO_DST="$JNI_OUT/$so_rel"
              mkdir -p "$(dirname "$SO_DST")"
              cp "$SO_SRC" "$SO_DST" 2>/dev/null
            done) || true
          fi

          SO_TOTAL=$(find "$JNI_OUT" -name "*.so" 2>/dev/null | wc -l)
          echo "  Total .so files: $SO_TOTAL"
          if [ "$SO_TOTAL" -gt 0 ]; then
            find "$JNI_OUT" -name "*.so" -exec ls -lh {} \;
          else
            echo "  (无 .so — WebRTC native libraries 可能缺失!)"
          fi

          # ---- Step 5: 组装最终 Fat AAR ----
          FAT_FINAL="$WORK/fat-aar-final"
          mkdir -p "$FAT_FINAL"
          echo ""
          echo "[Step 5] Assembling final Fat AAR..."

          # AndroidManifest.xml
          [ -f "$PLUGIN_EXTRACT/AndroidManifest.xml" ] && cp "$PLUGIN_EXTRACT/AndroidManifest.xml" "$FAT_FINAL/"

          # 合并后的 classes.jar
          cp "$CLASSES_MERGED" "$FAT_FINAL/classes.jar"

          # 所有 .so
          if [ -d "$JNI_OUT" ] && [ "$(ls -A "$JNI_OUT" 2>/dev/null)" ]; then
            cp -r "$JNI_OUT" "$FAT_FINAL/jni"
          fi

          # R.txt
          [ -f "$PLUGIN_EXTRACT/R.txt" ] && cp "$PLUGIN_EXTRACT/R.txt" "$FAT_FINAL/"

          # proguard.txt
          [ -f "$PLUGIN_EXTRACT/proguard.txt" ] && cp "$PLUGIN_EXTRACT/proguard.txt" "$FAT_FINAL/"

          # 打包成最终 AAR
          (cd "$FAT_FINAL" && jar cf "$ANDROID_ROOT/build/outputs/aar/livekit-c2c-fat.aar" .)

          FAT_SIZE=$(du -h "$ANDROID_ROOT/build/outputs/aar/livekit-c2c-fat.aar" | cut -f1)
          echo ""
          echo "========================================="
          echo "  Fat AAR 构建完成!"
          echo "  文件: livekit-c2c-fat.aar"
          echo "  大小: $FAT_SIZE"
          echo "========================================="
          echo ""
          echo "AAR 内容:"
          unzip -l "$ANDROID_ROOT/build/outputs/aar/livekit-c2c-fat.aar" | tail -40

      - name: Upload Android AAR (Fat)
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: android/build/outputs/aar/livekit-c2c-fat.aar
          if-no-files-found: error
          retention-days: 1

      - name: Confirm upload
        if: always()
        run: echo "Android AAR upload step completed (check above for errors)"

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create stub DCUniModule framework
        run: |
          FRAMEWORK_DIR=ci-stubs/build/DCUniModule.framework
          mkdir -p "$FRAMEWORK_DIR/Headers"
          
          cp ci-stubs/ios/DCUniModule.h "$FRAMEWORK_DIR/Headers/"
          
          echo "void _stub() {}" > /tmp/stub.c
          cc -c /tmp/stub.c -o /tmp/stub.o -arch arm64
          ar rcs "$FRAMEWORK_DIR/DCUniModule" /tmp/stub.o
          
          cat > "$FRAMEWORK_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>DCUniModule</string>
              <key>CFBundleIdentifier</key>
              <string>com.dcloud.DCUniModule</string>
              <key>CFBundleName</key>
              <string>DCUniModule</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST
          
          sudo cp -R "$FRAMEWORK_DIR" /Library/Frameworks/

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build iOS Framework
        run: |
          set -e
          
          cat > ios/project.yml << 'YML'
          name: LiveKitC2CCall
          options:
            bundleIdPrefix: com.livekit
            deploymentTarget:
              iOS: "14.0"
            xcodeVersion: "15.0"
          targets:
            LiveKitC2CCall:
              type: framework
              platform: iOS
              sources:
                - path: Classes
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.livekit.c2ccall
                INFOPLIST_FILE: Info.plist
                VALID_ARCHS: arm64
                ONLY_ACTIVE_ARCH: YES
                SKIP_INSTALL: YES
                BUILD_LIBRARY_FOR_DISTRIBUTION: YES
                TARGETED_DEVICE_FAMILY: "1,2"
                OTHER_LDFLAGS: "-framework DCUniModule"
                OTHER_CFLAGS: "-I/Library/Frameworks/DCUniModule.framework/Headers"
                LIBRARY_SEARCH_PATHS: "/Library/Frameworks"
                CLANG_ENABLE_MODULES: YES
              headers:
                - path: Classes/LiveKitC2CCallModule.h
                  public: true
          YML
          
          cd ios
          echo "=== Generating Xcode project ==="
          xcodegen generate
          echo "=== Generated files ==="
          ls -la
          
          echo "=== Building iOS Framework ==="
          xcodebuild \
            -project LiveKitC2CCall.xcodeproj \
            -scheme LiveKitC2CCall \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== xcodebuild exit code: $BUILD_EXIT_CODE ==="
          
          echo "=== Checking build output ==="
          ls -laR build/ 2>/dev/null || echo "No build directory!"
          
      - name: Verify iOS Framework
        run: |
          echo "=== Verifying iOS Framework at ios/build/LiveKitC2CCall.framework ==="
          if [ ! -d "ios/build/LiveKitC2CCall.framework" ]; then
            echo "ERROR: Framework directory not found!"
            echo "--- Last 80 lines of iOS build log ---"
            tail -80 ios/build.log 2>/dev/null || echo "No build log found"
            exit 1
          fi
          
          echo "=== Framework contents ==="
          ls -laR ios/build/LiveKitC2CCall.framework/
          
          # 检查 framework 二进制文件是否存在且非空
          BINARY="ios/build/LiveKitC2CCall.framework/LiveKitC2CCall"
          if [ ! -f "$BINARY" ]; then
            # 尝试其他可能的二进制名称
            BINARY=$(find ios/build/LiveKitC2CCall.framework -type f -name "LiveKitC2CCall*" ! -name "*.h" 2>/dev/null | head -1)
          fi
          
          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "WARNING: No binary found in framework"
          else
            echo "=== Binary file: $BINARY ==="
            ls -la "$BINARY"
            file "$BINARY"
            BINARY_SIZE=$(stat -f%z "$BINARY" 2>/dev/null || stat -c%s "$BINARY" 2>/dev/null)
            echo "Binary size: ${BINARY_SIZE} bytes"
            if [ "$BINARY_SIZE" -lt 1000 ]; then
              echo "ERROR: Framework binary suspiciously small (${BINARY_SIZE} bytes)"
              exit 1
            fi
          fi
          
          # 检查总大小
          TOTAL_SIZE=$(du -sk ios/build/LiveKitC2CCall.framework | cut -f1)
          echo "Total framework size: ${TOTAL_SIZE} KB"
          if [ "$TOTAL_SIZE" -lt 10 ]; then
            echo "ERROR: Framework total size too small (${TOTAL_SIZE} KB), likely incomplete"
            exit 1
          fi
          
          echo "=== iOS Framework verification PASSED ==="

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ios/build/LiveKitC2CCall.framework/
          if-no-files-found: error
          retention-days: 1

      - name: Confirm iOS upload
        if: always()
        run: echo "iOS Framework upload step completed (check above for errors)"

  package:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: List available artifacts
        run: |
          echo "=== Listing all workflow artifacts ==="
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "Attempting download from dependent jobs..."

      - name: Download Android AAR
        uses: actions/download-artifact@v4
        continue-on-error: false
        with:
          name: android-aar
          path: artifacts/android/

      - name: Verify Android AAR download
        run: |
          echo "=== Checking downloaded AAR ==="
          ls -laR artifacts/android/
          if [ ! -f "artifacts/android/livekit-c2c-fat.aar" ] && [ -z "$(ls -A artifacts/android/ 2>/dev/null)" ]; then
            echo "ERROR: Android AAR directory is empty or files missing!"
            exit 1
          fi
          echo "Download verification passed"

      - name: Download iOS Framework
        uses: actions/download-artifact@v4
        with:
          name: ios-framework
          path: artifacts/ios/

      - name: Verify iOS Framework download
        run: |
          echo "=== Checking downloaded iOS artifact ==="
          ls -laR artifacts/ios/ 2>/dev/null || { echo "ERROR: ios artifacts directory empty or missing!"; exit 1; }
          
          # 检查 framework 目录是否存在（artifact 下载可能展开为内部文件）
          if [ -d "artifacts/ios/LiveKitC2CCall.framework" ]; then
            echo "✓ LiveKitC2CCall.framework found"
          else
            # 可能 artifact 直接展开了框架内容，尝试重建目录结构
            echo "Framework directory not found directly. Checking contents..."
            echo "Files in artifacts/ios/:"
            find artifacts/ios/ -type f 2>/dev/null | head -20
            
            # 如果有 Info.plist 或二进制文件但缺少 .framework 包装
            if [ -f "artifacts/ios/Info.plist" ] || [ -f "artifacts/ios/LiveKitC2CCall" ]; then
              echo "Reconstructing .framework structure from flat contents..."
              mkdir -p artifacts/ios_reconstructed/LiveKitC2CCall.framework/Headers
              # 移动文件到正确的 framework 结构中
              if [ -f "artifacts/ios/Info.plist" ]; then
                mv artifacts/ios/Info.plist artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/LiveKitC2CCall" ]; then
                mv artifacts/ios/LiveKitC2CCall artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/Headers/LiveKitC2CCallModule.h" ]; then
                mv artifacts/ios/Headers artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              rm -rf artifacts/ios
              mv artifacts/ios_reconstructed artifacts/ios
              echo "Reconstruction complete:"
              ls -laR artifacts/ios/
            else
              echo "ERROR: Cannot find valid iOS framework content in downloaded artifact!"
              exit 1
            fi
          fi
          
          echo "iOS download verification passed"

      - name: Assemble plugin package
        run: |
          mkdir -p android ios
          cp artifacts/android/livekit-c2c-fat.aar android/livekit-c2c.aar
          cp -R artifacts/ios/LiveKitC2CCall.framework ios/

          rm -rf ci-stubs .github
          rm -f android/build.gradle android/settings.gradle android/proguard-rules.pro
          rm -rf android/gradle android/src
          rm -f ios/Podfile ios/LiveKitC2CCall.podspec ios/project.yml
          rm -rf ios/Classes ios/Info.plist
          rm -rf artifacts

          # 在 GITHUB_WORKSPACE 内直接打包，避免 cd .. 导致路径混乱
          zip -r LiveKit-C2CCall-v1.0.0.zip ./ \
            -x "DEVELOPMENT.md" ".git/*"

          echo "=== ZIP created ==="
          ls -la LiveKit-C2CCall-v1.0.0.zip
          unzip -l LiveKit-C2CCall-v1.0.0.zip | head -30

      - name: Upload plugin ZIP (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: livekit-c2c-plugin
          path: LiveKit-C2CCall-v1.0.0.zip
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: LiveKit-C2CCall v1.0.0
          body: |
            ## uni-app 原生插件自动构建产物

            **构建时间**: ${{ github.run_started_at }}
            **Commit**: ${{ github.sha }}
            **触发**: ${{ github.event_name }}

            ### 下载说明

            | 文件 | 说明 |
            |------|------|
            `LiveKit-C2CCall-v1.0.0.zip` | 完整插件包（含 Android + iOS），解压后放入 UniApp 项目 `nativeplugins/` 目录即可 |

            > 解压后目录结构：`LiveKit-C2CCall/android/livekit-c2c.aar` + `LiveKit-C2CCall/ios/LiveKitC2CCall.framework`
          files: LiveKit-C2CCall-v1.0.0.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
