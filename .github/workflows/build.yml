name: Build LiveKit-C2CCall Native Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir yet"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-34" "build-tools;34.0.0"
          echo "Installed platforms:"
          ls "$ANDROID_HOME/platforms/"

      - name: Create uni-app SDK stub AAR
        run: |
          set -e
          STUB_DIR=ci-stubs/build
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          
          echo "=== Android JAR check ==="
          ls -la "$ANDROID_JAR"
          
          mkdir -p $STUB_DIR/classes
          
          echo "=== Compiling stub sources ==="
          javac -d $STUB_DIR/classes \
            -source 17 -target 17 \
            -cp "$ANDROID_JAR" \
            ci-stubs/android/*.java
          
          echo "=== Creating classes.jar ==="
          (cd $STUB_DIR/classes && jar cf ../classes.jar .)
          
          echo "=== Creating stub AAR ==="
          mkdir -p $STUB_DIR/aar
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="io.dcloud.feature.uniapp"/>' > $STUB_DIR/aar/AndroidManifest.xml
          cp $STUB_DIR/classes.jar $STUB_DIR/aar/classes.jar
          (cd $STUB_DIR/aar && jar cf ../../uniapp-v8-release.aar .)
          
          mkdir -p libs
          cp ci-stubs/uniapp-v8-release.aar libs/
          
          echo "=== Stub AAR created successfully ==="

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate Gradle Wrapper (fix incomplete JAR)
        working-directory: android
        run: |
          echo "=== Checking gradlew wrapper ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "Wrapper files missing"
          # Use system Gradle to regenerate a correct wrapper
          gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          chmod +x gradlew
          echo "=== Regenerated wrapper ==="
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Build Android AAR
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== Build output ==="
          ls -la build/outputs/aar/ 2>/dev/null || { echo "ERROR: No AAR output directory found!"; exit 1; }
          if [ ! -f build/outputs/aar/*-release.aar ]; then
            echo "=== BUILD FAILED - No AAR found ==="
            tail -80 build.log
            exit 1
          fi
          echo "AAR file(s):"
          ls -la build/outputs/aar/*-release.aar

      - name: Verify AAR output
        run: |
          echo "=== Final AAR verification ==="
          echo "Files matching pattern:"
          ls -la android/build/outputs/aar/*-release.aar 2>&1 || true
          echo "File sizes:"
          du -h android/build/outputs/aar/*-release.aar 2>&1 || true
          echo "AAR contents (brief):"
          unzip -l android/build/outputs/aar/*-release.aar 2>&1 | head -20 || true

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: android/build/outputs/aar/*-release.aar
          if-no-files-found: error
          retention-days: 1

      - name: Confirm upload
        if: always()
        run: echo "Android AAR upload step completed (check above for errors)"

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create stub DCUniModule framework
        run: |
          FRAMEWORK_DIR=ci-stubs/build/DCUniModule.framework
          mkdir -p "$FRAMEWORK_DIR/Headers"
          
          cp ci-stubs/ios/DCUniModule.h "$FRAMEWORK_DIR/Headers/"
          
          echo "void _stub() {}" > /tmp/stub.c
          cc -c /tmp/stub.c -o /tmp/stub.o -arch arm64
          ar rcs "$FRAMEWORK_DIR/DCUniModule" /tmp/stub.o
          
          cat > "$FRAMEWORK_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>DCUniModule</string>
              <key>CFBundleIdentifier</key>
              <string>com.dcloud.DCUniModule</string>
              <key>CFBundleName</key>
              <string>DCUniModule</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST
          
          sudo cp -R "$FRAMEWORK_DIR" /Library/Frameworks/

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build iOS Framework
        run: |
          set -e
          
          cat > ios/project.yml << 'YML'
          name: LiveKitC2CCall
          options:
            bundleIdPrefix: com.livekit
            deploymentTarget:
              iOS: "14.0"
            xcodeVersion: "15.0"
          targets:
            LiveKitC2CCall:
              type: framework
              platform: iOS
              sources:
                - path: Classes
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.livekit.c2ccall
                INFOPLIST_FILE: Info.plist
                VALID_ARCHS: arm64
                ONLY_ACTIVE_ARCH: YES
                SKIP_INSTALL: YES
                BUILD_LIBRARY_FOR_DISTRIBUTION: YES
                TARGETED_DEVICE_FAMILY: "1,2"
                OTHER_LDFLAGS: "-framework DCUniModule"
                OTHER_CFLAGS: "-I/Library/Frameworks/DCUniModule.framework/Headers"
                LIBRARY_SEARCH_PATHS: "/Library/Frameworks"
                CLANG_ENABLE_MODULES: YES
              headers:
                - path: Classes/LiveKitC2CCallModule.h
                  public: true
          YML
          
          cd ios
          echo "=== Generating Xcode project ==="
          xcodegen generate
          echo "=== Generated files ==="
          ls -la
          
          echo "=== Building iOS Framework ==="
          xcodebuild \
            -project LiveKitC2CCall.xcodeproj \
            -scheme LiveKitC2CCall \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== xcodebuild exit code: $BUILD_EXIT_CODE ==="
          
          echo "=== Checking build output ==="
          ls -laR build/ 2>/dev/null || echo "No build directory!"
          
      - name: Verify iOS Framework
        run: |
          echo "=== Verifying iOS Framework at ios/build/LiveKitC2CCall.framework ==="
          if [ ! -d "ios/build/LiveKitC2CCall.framework" ]; then
            echo "ERROR: Framework directory not found!"
            echo "--- Last 80 lines of iOS build log ---"
            tail -80 ios/build.log 2>/dev/null || echo "No build log found"
            exit 1
          fi
          
          echo "=== Framework contents ==="
          ls -laR ios/build/LiveKitC2CCall.framework/
          
          # 检查 framework 二进制文件是否存在且非空
          BINARY="ios/build/LiveKitC2CCall.framework/LiveKitC2CCall"
          if [ ! -f "$BINARY" ]; then
            # 尝试其他可能的二进制名称
            BINARY=$(find ios/build/LiveKitC2CCall.framework -type f -name "LiveKitC2CCall*" ! -name "*.h" 2>/dev/null | head -1)
          fi
          
          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "WARNING: No binary found in framework"
          else
            echo "=== Binary file: $BINARY ==="
            ls -la "$BINARY"
            file "$BINARY"
            BINARY_SIZE=$(stat -f%z "$BINARY" 2>/dev/null || stat -c%s "$BINARY" 2>/dev/null)
            echo "Binary size: ${BINARY_SIZE} bytes"
            if [ "$BINARY_SIZE" -lt 1000 ]; then
              echo "ERROR: Framework binary suspiciously small (${BINARY_SIZE} bytes)"
              exit 1
            fi
          fi
          
          # 检查总大小
          TOTAL_SIZE=$(du -sk ios/build/LiveKitC2CCall.framework | cut -f1)
          echo "Total framework size: ${TOTAL_SIZE} KB"
          if [ "$TOTAL_SIZE" -lt 10 ]; then
            echo "ERROR: Framework total size too small (${TOTAL_SIZE} KB), likely incomplete"
            exit 1
          fi
          
          echo "=== iOS Framework verification PASSED ==="

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ios/build/LiveKitC2CCall.framework/
          if-no-files-found: error
          retention-days: 1

      - name: Confirm iOS upload
        if: always()
        run: echo "iOS Framework upload step completed (check above for errors)"

  package:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List available artifacts
        run: |
          echo "=== Listing all workflow artifacts ==="
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "Attempting download from dependent jobs..."

      - name: Download Android AAR
        uses: actions/download-artifact@v4
        continue-on-error: false
        with:
          name: android-aar
          path: artifacts/android/

      - name: Verify Android AAR download
        run: |
          echo "=== Checking downloaded AAR ==="
          ls -laR artifacts/android/
          if [ ! -f "artifacts/android/*-release.aar" ] && [ -z "$(ls -A artifacts/android/ 2>/dev/null)" ]; then
            echo "ERROR: Android AAR directory is empty or files missing!"
            exit 1
          fi
          echo "Download verification passed"

      - name: Download iOS Framework
        uses: actions/download-artifact@v4
        with:
          name: ios-framework
          path: artifacts/ios/

      - name: Verify iOS Framework download
        run: |
          echo "=== Checking downloaded iOS artifact ==="
          ls -laR artifacts/ios/ 2>/dev/null || { echo "ERROR: ios artifacts directory empty or missing!"; exit 1; }
          
          # 检查 framework 目录是否存在（artifact 下载可能展开为内部文件）
          if [ -d "artifacts/ios/LiveKitC2CCall.framework" ]; then
            echo "✓ LiveKitC2CCall.framework found"
          else
            # 可能 artifact 直接展开了框架内容，尝试重建目录结构
            echo "Framework directory not found directly. Checking contents..."
            echo "Files in artifacts/ios/:"
            find artifacts/ios/ -type f 2>/dev/null | head -20
            
            # 如果有 Info.plist 或二进制文件但缺少 .framework 包装
            if [ -f "artifacts/ios/Info.plist" ] || [ -f "artifacts/ios/LiveKitC2CCall" ]; then
              echo "Reconstructing .framework structure from flat contents..."
              mkdir -p artifacts/ios_reconstructed/LiveKitC2CCall.framework/Headers
              # 移动文件到正确的 framework 结构中
              if [ -f "artifacts/ios/Info.plist" ]; then
                mv artifacts/ios/Info.plist artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/LiveKitC2CCall" ]; then
                mv artifacts/ios/LiveKitC2CCall artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/Headers/LiveKitC2CCallModule.h" ]; then
                mv artifacts/ios/Headers artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              rm -rf artifacts/ios
              mv artifacts/ios_reconstructed artifacts/ios
              echo "Reconstruction complete:"
              ls -laR artifacts/ios/
            else
              echo "ERROR: Cannot find valid iOS framework content in downloaded artifact!"
              exit 1
            fi
          fi
          
          echo "iOS download verification passed"

      - name: Assemble plugin package
        run: |
          mkdir -p android ios
          cp artifacts/android/*-release.aar android/livekit-c2c.aar
          cp -R artifacts/ios/LiveKitC2CCall.framework ios/

          rm -rf ci-stubs .github
          rm -f android/build.gradle android/settings.gradle android/proguard-rules.pro
          rm -rf android/gradle android/src
          rm -f ios/Podfile ios/LiveKitC2CCall.podspec ios/project.yml
          rm -rf ios/Classes ios/Info.plist
          rm -rf artifacts

          # 在 GITHUB_WORKSPACE 内直接打包，避免 cd .. 导致路径混乱
          zip -r LiveKit-C2CCall-v1.0.0.zip ./ \
            -x "DEVELOPMENT.md" ".git/*"

          echo "=== ZIP created ==="
          ls -la LiveKit-C2CCall-v1.0.0.zip
          unzip -l LiveKit-C2CCall-v1.0.0.zip | head -30

      - name: Upload plugin ZIP (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: livekit-c2c-plugin
          path: LiveKit-C2CCall-v1.0.0.zip
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: LiveKit-C2CCall v1.0.0
          body: |
            ## uni-app 原生插件自动构建产物

            **构建时间**: ${{ github.run_started_at }}
            **Commit**: ${{ github.sha }}
            **触发**: ${{ github.event_name }}

            ### 下载说明

            | 文件 | 说明 |
            |------|------|
            `LiveKit-C2CCall-v1.0.0.zip` | 完整插件包（含 Android + iOS），解压后放入 UniApp 项目 `nativeplugins/` 目录即可 |

            > 解压后目录结构：`LiveKit-C2CCall/android/livekit-c2c.aar` + `LiveKit-C2CCall/ios/LiveKitC2CCall.framework`
          files: LiveKit-C2CCall-v1.0.0.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
