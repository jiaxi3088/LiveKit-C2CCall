name: Build LiveKit-C2CCall Native Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix source issues
        run: |
          # Remove duplicate .kt file (conflicts with .java)
          rm -f android/src/main/kotlin/com/livekit/c2ccall/LiveKitC2CCallModule.kt
          
          # Add missing JSCallback import
          sed -i 's/import io.dcloud.feature.uniapp.bridge.UniJSCallback;/import io.dcloud.feature.uniapp.bridge.JSCallback;\nimport io.dcloud.feature.uniapp.bridge.UniJSCallback;/' \
            android/src/main/java/com/livekit/c2ccall/LiveKitC2CCallModule.java

      - name: Create uni-app SDK stub AAR
        run: |
          STUB_DIR=ci-stubs/build
          mkdir -p $STUB_DIR/classes
          
          # Compile stub Java sources using Android SDK android.jar
          javac -d $STUB_DIR/classes \
            -target 17 -source 17 \
            -bootclasspath $ANDROID_HOME/platforms/android-34/android.jar \
            ci-stubs/android/UniJSMethod.java \
            ci-stubs/android/JSCallback.java \
            ci-stubs/android/UniJSCallback.java \
            ci-stubs/android/UniSDKInstance.java \
            ci-stubs/android/UniModule.java
          
          # Create classes.jar from compiled stubs
          cd $STUB_DIR/classes
          jar cf ../classes.jar *
          cd ../../..
          
          # Create AAR (ZIP format with AndroidManifest.xml + classes.jar)
          mkdir -p $STUB_DIR/aar/META-INF
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="io.dcloud.feature.uniapp"/>' > $STUB_DIR/aar/AndroidManifest.xml
          cp $STUB_DIR/classes.jar $STUB_DIR/aar/classes.jar
          cd $STUB_DIR/aar
          jar cf ../../uniapp-v8-release.aar AndroidManifest.xml classes.jar
          cd ../../..
          
          # Copy stub AAR to libs directory (build.gradle expects ../libs/)
          mkdir -p libs
          cp ci-stubs/uniapp-v8-release.aar libs/

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: Build Android AAR
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: android/build/outputs/aar/*-release.aar
          if-no-files-found: warn

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create stub DCUniModule framework
        run: |
          FRAMEWORK_DIR=ci-stubs/build/DCUniModule.framework
          mkdir -p "$FRAMEWORK_DIR/Headers"
          
          cp ci-stubs/ios/DCUniModule.h "$FRAMEWORK_DIR/Headers/"
          
          # Create minimal static library
          echo "void _stub() {}" > /tmp/stub.c
          cc -c /tmp/stub.c -o /tmp/stub.o -arch arm64
          ar rcs "$FRAMEWORK_DIR/DCUniModule" /tmp/stub.o
          
          # Create Info.plist
          cat > "$FRAMEWORK_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>DCUniModule</string>
              <key>CFBundleIdentifier</key>
              <string>com.dcloud.DCUniModule</string>
              <key>CFBundleName</key>
              <string>DCUniModule</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST
          
          # Install to system Frameworks for header search
          sudo cp -R "$FRAMEWORK_DIR" /Library/Frameworks/

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build iOS Framework
        run: |
          # Create xcodegen project spec
          cat > ios/project.yml << 'YML'
          name: LiveKitC2CCall
          options:
            bundleIdPrefix: com.livekit
            deploymentTarget:
              iOS: "14.0"
            xcodeVersion: "15.0"
          targets:
            LiveKitC2CCall:
              type: framework
              platform: iOS
              sources:
                - path: Classes
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.livekit.c2ccall
                INFOPLIST_FILE: Info.plist
                VALID_ARCHS: arm64
                ONLY_ACTIVE_ARCH: YES
                SKIP_INSTALL: YES
                BUILD_LIBRARY_FOR_DISTRIBUTION: YES
                TARGETED_DEVICE_FAMILY: "1,2"
                OTHER_LDFLAGS: -ObjC
                CLANG_ENABLE_MODULES: YES
              headers:
                - path: Classes/LiveKitC2CCallModule.h
                  public: true
          YML
          
          cd ios
          xcodegen generate
          
          # Build for arm64 (iOS device)
          xcodebuild \
            -project LiveKitC2CCall.xcodeproj \
            -scheme LiveKitC2CCall \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            2>&1 | tee build.log
          
          # Check build result
          if [ ! -d "build/LiveKitC2CCall.framework" ]; then
            echo "=== BUILD FAILED ==="
            tail -50 build.log
            exit 1
          fi

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ios/build/LiveKitC2CCall.framework
          if-no-files-found: warn

  package:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android AAR
        uses: actions/download-artifact@v4
        with:
          name: android-aar
          path: artifacts/android/

      - name: Download iOS Framework
        uses: actions/download-artifact@v4
        with:
          name: ios-framework
          path: artifacts/ios/

      - name: Assemble plugin package
        run: |
          # Copy AAR to android/ directory (standard plugin structure)
          mkdir -p android ios
          cp artifacts/android/*-release.aar android/livekit-c2c.aar
          
          # Copy framework to ios/ directory
          cp -R artifacts/ios/LiveKitC2CCall.framework ios/
          
          # Clean CI-only files from the package
          rm -rf ci-stubs .github
          rm -f android/build.gradle android/settings.gradle android/proguard-rules.pro
          rm -rf android/gradle android/src
          rm -f ios/Podfile ios/LiveKitC2CCall.podspec ios/project.yml
          rm -rf ios/Classes ios/Info.plist
          rm -rf artifacts
          
          # Create final plugin ZIP (must include top-level folder name)
          cd ..
          zip -r LiveKit-C2CCall-v1.0.0.zip LiveKit-C2CCall/ \
            -x "LiveKit-C2CCall/DEVELOPMENT.md"
          mv LiveKit-C2CCall-v1.0.0.zip LiveKit-C2CCall/

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: livekit-c2c-plugin
          path: LiveKit-C2CCall/LiveKit-C2CCall-v1.0.0.zip
          if-no-files-found: error
