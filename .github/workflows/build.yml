name: Build LiveKit-C2CCall Native Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir yet"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-34" "build-tools;34.0.0"
          echo "Installed platforms:"
          ls "$ANDROID_HOME/platforms/"

      - name: Create uni-app SDK stub AAR
        run: |
          set -e
          STUB_DIR=ci-stubs/build
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          
          echo "=== Android JAR check ==="
          ls -la "$ANDROID_JAR"
          
          mkdir -p $STUB_DIR/classes
          
          echo "=== Compiling stub sources ==="
          javac -d $STUB_DIR/classes \
            -source 17 -target 17 \
            -cp "$ANDROID_JAR" \
            ci-stubs/android/*.java
          
          echo "=== Creating classes.jar ==="
          (cd $STUB_DIR/classes && jar cf ../classes.jar .)
          
          echo "=== Creating stub AAR ==="
          mkdir -p $STUB_DIR/aar
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="io.dcloud.feature.uniapp"/>' > $STUB_DIR/aar/AndroidManifest.xml
          cp $STUB_DIR/classes.jar $STUB_DIR/aar/classes.jar
          (cd $STUB_DIR/aar && jar cf ../../uniapp-v8-release.aar .)
          
          mkdir -p libs
          cp ci-stubs/uniapp-v8-release.aar libs/
          
          echo "=== Stub AAR created successfully ==="

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate Gradle Wrapper (fix incomplete JAR)
        working-directory: android
        run: |
          echo "=== Checking gradlew wrapper ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "Wrapper files missing"
          # Use system Gradle to regenerate a correct wrapper
          gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          chmod +x gradlew
          echo "=== Regenerated wrapper ==="
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Build Android AAR
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          echo "=== Build output ==="
          ls -la build/outputs/aar/ 2>/dev/null || { echo "ERROR: No AAR output directory found!"; exit 1; }
          if [ ! -f build/outputs/aar/*-release.aar ]; then
            echo "=== BUILD FAILED - No AAR found ==="
            tail -80 build.log
            exit 1
          fi
          echo "AAR file(s):"
          ls -la build/outputs/aar/*-release.aar

      - name: Create Full Fat AAR (LiveKit + WebRTC + .so ALL IN)
        working-directory: android
        run: |
          set -e

          # ====== Full Fat AAR: 全量依赖自包含 v8 (保守全量打包) ======
          # 此 AAR 包含: 插件代码 + LiveKit SDK + 全部传递依赖 + WebRTC + arm64 .so
          # ════════════════════════════════════════════════════════════════════
          # v8 核心变更: 废除黑名单模式，全量保留所有 .class 文件
          # ════════════════════════════════════════════════════════════════════
          #
          # 黑名单模式的死胡同教训:
          #   v7    删除 kotlinx/*     → 运行时缺 JsonKt           ❌
          #   v7.5  保留 serialization → 运行时缺 SdpFactory       ❌
          #   下一步? 可能还缺 livekit.org.webrtc.xxx 等...
          #
          # 根因: 无法预先枚举 LiveKit SDK 的所有间接依赖
          #
          # v8 策略: 不再主动删除任何 .class 文件!
          #   仅删除 _COROUTINE/* (唯一确认的顶层包冲突源)
          #   打包时只包含 *.class (避免 META-INF 资源冲突)
          # v4/v3 修复保留:
          #   1) Step 6 验证改为检查 classes.jar 内部内容
          #   2) 新增策略5: 全量扫描 Gradle cache 定位 livekit.org.webrtc Java 类

          ANDROID_ROOT="$(pwd)"
          WORK="$ANDROID_ROOT/fat-aar-work"
          SRC_AAR="$(ls $ANDROID_ROOT/build/outputs/aar/*-release.aar | head -1)"
          
          echo "=== Full Fat AAR Build ==="
          echo "  Source: $(basename $SRC_AAR)"
          echo "  Work:   $WORK"
          
          rm -rf "$WORK" && mkdir -p "$WORK"

          # ---- Step 1: 解压插件自身 AAR ----
          PLUGIN_EXTRACT="$WORK/plugin-extract"
          mkdir -p "$PLUGIN_EXTRACT"
          unzip -qo "$SRC_AAR" -d "$PLUGIN_EXTRACT"
          echo "[Step 1] ✓ Plugin extracted"

          # ---- Step 2: 定位并提取 LiveKit SDK ----
          LIVEKIT_DIR="$WORK/livekit-sdk"
          mkdir -p "$LIVEKIT_DIR"
          GRADLE_CACHE="$HOME/.gradle/caches"
          
          echo "[Step 2] Locating LiveKit SDK in Gradle cache..."
          
          LIVEKIT_AAR=""
          for search_path in \
            "$GRADLE_CACHE/modules-2/files-2.1/io.livekit/livekit-android/2.25.1" \
            "$GRADLE_CACHE/modules-2/files-livekit-android/io.livekit/livekit-android/2.25.1"; do
            [ -d "$search_path" ] || continue
            CANDIDATE=$(find "$search_path" -maxdepth 3 -name "livekit-android-*.aar" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
            [ -n "$CANDIDATE" ] && { LIVEKIT_AAR="$CANDIDATE"; break; }
          done

          if [ -z "$LIVEKIT_AAR" ]; then
            LIVEKIT_AAR=$(find "$GRADLE_CACHE" -path "*livekit-android*2.25.1*" \
              -name "*.aar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
          fi

          if [ -n "$LIVEKIT_AAR" ] && [ -f "$LIVEKIT_AAR" ]; then
            unzip -qo "$LIVEKIT_AAR" -d "$LIVEKIT_DIR" 2>/dev/null || true
            if [ -f "$LIVEKIT_DIR/classes.jar" ] && [ ! -s "$LIVEKIT_DIR/classes.jar" ]; then
              rm -f "$LIVEKIT_DIR/classes.jar"
            fi
            echo "[Step 2] ✓ LiveKit SDK found: $(basename $LIVEKIT_AAR) ($(du -h $LIVEKIT_AAR | cut -f1))"
            ls -la "$LIVEKIT_DIR/" 2>/dev/null || true

            # 诊断: 检查 LiveKit SDK 自身是否已包含 livekit.org.webrtc 类
            if [ -f "$LIVEKIT_DIR/classes.jar" ] && [ -s "$LIVEKIT_DIR/classes.jar" ]; then
              LK_INTERNAL_WC=$(unzip -l "$LIVEKIT_DIR/classes.jar" 2>/dev/null | grep "livekit/org/webrtc/" | head -5)
              LK_INTERNAL_IO=$(unzip -l "$LIVEKIT_DIR/classes.jar" 2>/dev/null | grep "io/livekit/" | wc -l)
              echo "[Step 2]   Diagnostic: io.livekit.* classes in SDK: $LK_INTERNAL_IO"
              if [ -n "$LK_INTERNAL_WC" ]; then
                echo "[Step 2]   ✅ livekit.org.webrtc.* found INSIDE livekit-android AAR:"
                echo "$LK_INTERNAL_WC"
              else
                echo "[Step 2]   ℹ livekit.org.webrtc.* NOT inside livekit-android (expected in separate artifact)"
              fi
              # 列出 LiveKit classes.jar 的顶层包
              echo "[Step 2]   Top packages in livekit-android classes.jar:"
              unzip -l "$LIVEKIT_DIR/classes.jar" 2>/dev/null | grep "\.class$" | cut -d'/' -f1-3 | sort -u | head -20
            fi
          else
            echo "[Step 2] ✗ FATAL: LiveKit AAR not found!"
            exit 1
          fi

          # ---- Step 2b: 定位并提取 livekit-android-webrtc (repackaged WebRTC) ----
          # 关键: LiveKit 2.x 需要 livekit.org.webrtc.* (不是 org.webrtc.*)
          # 来源: io.livekit:livekit-android-webrtc 或 io.github.webrtc-sdk:android-prefixed
          WEBRTC_DIR="$WORK/webrtc-sdk"
          mkdir -p "$WEBRTC_DIR"

          echo "[Step 2b] Locating repackaged WebRTC (livekit.org.webrtc.*)..."
          WEBRTC_AAR=""

          # 策略1: livekit-android-webrtc (LiveKit 官方 WebRTC 打包)
          for webrtc_search in \
            "$GRADLE_CACHE/modules-2/files-2.1/io.livekit/livekit-android-webrtc" \
            "$GRADLE_CACHE/modules-2/files-livekit-android/io.livekit/livekit-android-webrtc"; do
            [ -d "$webrtc_search" ] || continue
            CANDIDATE=$(find "$webrtc_search" -maxdepth 4 -name "*.aar" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
            [ -n "$CANDIDATE" ] && { WEBRTC_AAR="$CANDIDATE"; echo "[Step 2b]   Found via livekit-android-webrtc"; break; }
          done

          # 策略2: android-prefixed (io.github.webrtc-sdk)
          if [ -z "$WEBRTC_AAR" ]; then
            for webrtc_search in \
              "$GRADLE_CACHE/modules-2/files-2.1/io.github.webrtc-sdk/android-prefixed" \
              "$GRADLE_CACHE/modules-2/files-livekit-android/io.github.webrtc-sdk/android-prefixed"; do
              [ -d "$webrtc_search" ] || continue
              CANDIDATE=$(find "$webrtc_search" -maxdepth 4 -name "android-prefixed*.aar" \
                ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
              [ -n "$CANDIDATE" ] && { WEBRTC_AAR="$CANDIDATE"; echo "[Step 2b]   Found via android-prefixed"; break; }
            done
          fi

          # 策略3: 宽泛搜索含 livekit.org.webrtc 的 AAR
          if [ -z "$WEBRTC_AAR" ]; then
            echo "[Step 2b]   Broad search for livekit.org.webrtc.PeerConnectionFactory..."
            FOUND_CNT=0
            for wc in $(find "$GRADLE_CACHE" -name "*.aar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -100); do
              if unzip -l "$wc" 2>/dev/null | grep -q "livekit/org/webrtc/PeerConnectionFactory"; then
                WEBRTC_AAR="$wc"
                echo "[Step 2b]   Found: $(basename $wc)"
                break
              fi
              FOUND_CNT=$((FOUND_CNT + 1))
            done
            echo "[Step 2b]   Scanned $FOUND_CNT AARs for livekit.org.webrtc"
          fi

          # 策略4: 搜索含 org/webrtc/EglBase 的（标准 WebRTC 作为最后兜底）
          if [ -z "$WEBRTC_AAR" ]; then
            echo "[Step 2b]   Fallback: searching for org.webrtc.EglBase..."
            for wc in $(find "$GRADLE_CACHE" -name "*.aar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -50); do
              if unzip -l "$wc" 2>/dev/null | grep -q "org/webrtc/EglBase"; then
                WEBRTC_AAR="$wc"
                echo "[Step 2b]   Found (fallback): $(basename $wc)"
                break
              fi
            done
          fi

          if [ -n "$WEBRTC_AAR" ] && [ -f "$WEBRTC_AAR" ]; then
            unzip -qo "$WEBRTC_AAR" -d "$WEBRTC_DIR" 2>/dev/null || true
            echo "[Step 2b] ✓ WebRTC found: $(basename $WEBRTC_AAR) ($(du -h $WEBRTC_AAR | cut -f1))"
            
            # 验证关键类存在
            if [ -f "$WEBRTC_DIR/classes.jar" ]; then
              LK_WC_CHECK=$(unzip -l "$WEBRTC_DIR/classes.jar" 2>/dev/null | grep "livekit/org/webrtc/PeerConnectionFactory" || echo "NOT_FOUND")
              echo "[Step 2b]   livekit.org.webrtc.PeerConnectionFactory: $LK_WC_CHECK"
              STD_WC_CHECK=$(unzip -l "$WEBRTC_DIR/classes.jar" 2>/dev/null | grep "org/webrtc/EglBase" || echo "NOT_FOUND")
              echo "[Step 2b]   org.webrtc.EglBase: $STD_WC_CHECK"
              WC_COUNT=$(unzip -l "$WEBRTC_DIR/classes.jar" 2>/dev/null | grep "\.class$" | wc -l)
              echo "[Step 2b]   Total classes: $WC_COUNT"
              
              # 严重警告: 如果没有 livekit.org.webrtc 类，运行时会崩溃!
              if echo "$LK_WC_CHECK" | grep -q "NOT_FOUND"; then
                echo "[Step 2b] ⚠️ WARNING: No livekit.org.webrtc.* classes in this AAR!"
                echo "[Step 2b]   $(basename $WEBRTC_AAR) appears to be a native-only (.so) artifact"
                echo "[Step 2b]   Searching for separate Java-class artifact..."
                
                # 策略5: 搜索整个 Gradle cache 中包含 livekit.org.webrtc 的 JAR/AAR（不限位置）
                WEBRTC_JAVA_JAR=""
                for candidate in $(find "$GRADLE_CACHE" -name "*.jar" -o -name "*.aar" 2>/dev/null | head -200); do
                  if unzip -l "$candidate" 2>/dev/null | grep -q "livekit/org/webrtc/PeerConnectionFactory"; then
                    WEBRTC_JAVA_JAR="$candidate"
                    echo "[Step 2b]   ✅ Found livekit.org.webrtc classes in: $(basename $candidate)"
                    echo "[Step 2b]      Path: $candidate"
                    echo "[Step 2b]      Size: $(du -h $candidate | cut -f1)"
                    break
                  fi
                done
                
                if [ -n "$WEBRTC_JAVA_JAR" ] && [ -f "$WEBRTC_JAVA_JAR" ]; then
                  # 将找到的 Java 类解压到 WEBRTC_DIR（合并到 classes.jar）
                  mkdir -p "$WEBRTC_DIR/java-classes"
                  if [[ "$WEBRTC_JAVA_JAR" == *.aar ]]; then
                    TMP_JAVAExtract="$WORK/webrtc-java-tmp"
                    rm -rf "$TMP_JAVAExtract" && mkdir -p "$TMP_JAVAExtract"
                    unzip -qo "$WEBRTC_JAVA_JAR" -d "$TMP_JAVAExtract" 2>/dev/null || true
                    if [ -f "$TMP_JAVAExtract/classes.jar" ] && [ -s "$TMP_JAVAExtract/classes.jar" ]; then
                      unzip -qo "$TMP_JAVAExtract/classes.jar" -d "$WEBRTC_DIR/java-classes" 2>/dev/null || true
                    fi
                    rm -rf "$TMP_JAVAExtract"
                  else
                    unzip -qo "$WEBRTC_JAVA_JAR" -d "$WEBRTC_DIR/java-classes" 2>/dev/null || true
                  fi
                  
                  JAVA_WC_CNT=$(find "$WEBRTC_DIR/java-classes" -name "*.class" 2>/dev/null | wc -l)
                  echo "[Step 2b]   ✅ Extracted $JAVA_WC_CNT livekit.org.webrtc.* class files"
                  
                  # 验证关键类
                  if [ -f "$WEBRTC_DIR/java-classes/livekit/org/webrtc/PeerConnectionFactory.class" ] || \
                     [ -f "$WEBRTC_DIR/java-classes/livekit/org/webrtc/PeerConnectionFactory\$InitializationOptions.class" ]; then
                    echo "[Step 2b]   ✅ Key class PeerConnectionFactory confirmed!"
                  fi
                else
                  echo "[Step 2b]   ❌ Could NOT find livekit.org.webrtc Java classes anywhere!"
                  echo "[Step 2b]   The app WILL crash with NoClassDefFoundError on LiveKit.init()"
                fi
              fi
            else
              echo "[Step 2b]   ⚠ No classes.jar in WebRTC AAR"
            fi
          else
            echo "[Step 2b] ✗ FATAL: WebRTC AAR not found at all!"
            echo "[Step 2b]   The app WILL crash with NoClassDefFoundError on LiveKit.init()"
            # 不退出，继续尝试从 deps-runtime.txt 合并
          fi

          # ---- Step 3: 全量打包所有运行时依赖 (Full Fat AAR) v8 ----
          # v8 策略: 合并所有依赖 + 仅删除 _COROUTINE + 只打包 .class
          MERGED_CLASSES="$WORK/merged-classes"
          mkdir -p "$MERGED_CLASSES"
          echo ""
          echo "[Step 3] Full Fat AAR v8: merge ALL deps, conservative pack..."

          # 3a: 插件自身代码
          if [ -f "$PLUGIN_EXTRACT/classes.jar" ] && [ -s "$PLUGIN_EXTRACT/classes.jar" ]; then
            unzip -qo "$PLUGIN_EXTRACT/classes.jar" -d "$MERGED_CLASSES" 2>/dev/null || true
            echo "  ✓ Plugin code ($(du -h $PLUGIN_EXTRACT/classes.jar | cut -f1))"
          fi

          # 3b: 合并 releaseRuntimeClasspath 必要运行时依赖
          echo "[Step 3b] Merging required runtime dependencies..."

          should_skip_embedded_classes_dep() {
            case "$1" in
              appcompat-*.aar|appcompat-resources-*.aar|fragment-*.aar|activity-*.aar|drawerlayout-*.aar|emoji2-*.aar|emoji2-views-helper-*.aar|vectordrawable-*.aar|vectordrawable-animated-*.aar|viewpager-*.aar|customview-*.aar|loader-*.aar|cursoradapter-*.aar|interpolator-*.aar|versionedparcelable-*.aar|profileinstaller-*.aar|startup-runtime-*.aar|tracing-*.aar|savedstate-*.aar|core-*.aar|core-ktx-*.aar|core-common-*.jar|core-runtime-*.aar|lifecycle-*.aar|lifecycle-*.jar|annotation-*.jar|annotation-jvm-*.jar|annotation-experimental-*.aar|annotations-*.jar|resourceinspection-annotation-*.jar|collection-*.jar|concurrent-futures-*.jar|listenablefuture-*.jar|kotlin-stdlib*.jar|kotlin-stdlib-*.jar|kotlin-stdlib-*.aar|kotlinx-coroutines-*.jar|kotlinx-coroutines-*.aar|gson-*.jar|gson-*.aar|okhttp-*.jar|okhttp-*.aar|okio-*.jar|okio-*.aar|okio-jvm-*.jar)
                return 0
                ;;
            esac
            return 1
          }
          
          ./gradlew :exportDeps --quiet 2>/dev/null || true

          if [ -f "$ANDROID_ROOT/build/exports/deps-runtime.txt" ]; then
            DEP_CNT=0
            SKIP_CNT=0
            
            while IFS= read -r DEP_PATH; do
              [ -f "$DEP_PATH" ] || continue
              DEP_NAME=$(basename "$DEP_PATH")
              
              # 跳过插件自身、uniapp stub，以及交给 HBuilderX/package.json 处理的 AndroidX 依赖
              echo "$DEP_NAME" | grep -qi "^livekit-c2ccall" && { SKIP_CNT=$((SKIP_CNT+1)); continue; }
              echo "$DEP_PATH" | grep -qi "uniapp" && { SKIP_CNT=$((SKIP_CNT+1)); continue; }
              if should_skip_embedded_classes_dep "$DEP_NAME"; then
                echo "  - external $DEP_NAME (provided by HBuilderX/package.json)"
                SKIP_CNT=$((SKIP_CNT+1))
                continue
              fi
              
              # 解压 classes.jar（AAR）或直接解压 JAR
              TMP_EXTRACT="$WORK/dep-tmp-$RANDOM"
              mkdir -p "$TMP_EXTRACT"
              if [[ "$DEP_PATH" == *.aar ]]; then
                unzip -qo "$DEP_PATH" -d "$TMP_EXTRACT" 2>/dev/null || true
                SRC_JAR="$TMP_EXTRACT/classes.jar"
              else
                SRC_JAR="$DEP_PATH"
              fi
              
              if [ -f "$SRC_JAR" ] && [ -s "$SRC_JAR" ]; then
                unzip -qo "$SRC_JAR" -d "$MERGED_CLASSES" 2>/dev/null || true
                DEP_SIZE=$(du -h "$SRC_JAR" | cut -f1)
                echo "  ✓ $DEP_NAME ($DEP_SIZE)"
                DEP_CNT=$((DEP_CNT+1))
              fi
              rm -rf "$TMP_EXTRACT"
            done < "$ANDROID_ROOT/build/exports/deps-runtime.txt"
            
            echo "  --- Merged $DEP_CNT dependencies (skipped $SKIP_CNT: plugin + uniapp stub) ---"
          else
            echo "  ⚠ No deps-runtime.txt, falling back to manual merge..."
            if [ -f "$LIVEKIT_DIR/classes.jar" ] && [ -s "$LIVEKIT_DIR/classes.jar" ]; then
              unzip -qo "$LIVEKIT_DIR/classes.jar" -d "$MERGED_CLASSES" 2>/dev/null || true
              echo "  ✓ LiveKit SDK ($(du -h $LIVEKIT_DIR/classes.jar | cut -f1))"
            fi
            if [ -f "$WEBRTC_DIR/classes.jar" ] && [ -s "$WEBRTC_DIR/classes.jar" ]; then
              unzip -qo "$WEBRTC_DIR/classes.jar" -d "$MERGED_CLASSES" 2>/dev/null || true
              echo "  ✓ WebRTC ($(du -h $WEBRTC_DIR/classes.jar | cut -f1))"
            fi
          fi

          # 3b-extra: 合并 Step 2b 从 shadow-all.jar 提取出的 WebRTC Java 类
          # android-prefixed AAR 可能只含 .so，livekit.org.webrtc.* Java 类位于 Gradle transformed shadow-all.jar
          if [ -d "$WEBRTC_DIR/java-classes" ]; then
            WEBRTC_JAVA_CNT=$(find "$WEBRTC_DIR/java-classes" -name "*.class" 2>/dev/null | wc -l)
            if [ "$WEBRTC_JAVA_CNT" -gt 0 ]; then
              cp -R "$WEBRTC_DIR/java-classes/." "$MERGED_CLASSES/"
              echo "  ✓ WebRTC Java classes from shadow-all.jar ($WEBRTC_JAVA_CNT classes)"
            fi
          fi

          # ---- Step 3c: v8 保守全量打包 (Conservative Full Pack) ----
          #
          # ═════════════════════════════════════════════════════
          # v7.5 核心变更: 修复 kotlinx/serialization 被误删问题
          # ═════════════════════════════════════════════════════
          # v7.4 运行时崩溃:
          #   NoClassDefFoundError: kotlinx/serialization/json/JsonKt
          #
          # 根因: "kotlinx" 前缀删除了整个 kotlinx/ 目录，包括:
          #   - kotlinx/coroutines/*    → HBuilderX 有 ✅ 应该删除
          #   - kotlinx/serialization/** → HBuilderX 没有 ❌ 不应删除!
          #
          # LiveKit SDK 依赖 kotlinx-serialization-json 做 JSON 序列化，
          # 这个库不在 HBuilderX 基座中。
          #
          # 策略变更:
          #   A) 粗粒度删除: 对大多数库仍使用顶级前缀 (androidx, kotlin, okhttp3 等)
          #   B) 细粒度删除: 对 kotlinx 只删除已知冲突的子包，保留非冲突子包
          #      - 删除: kotlinx/coroutines, kotlinx/atomicfu 等 HBuilderX 已有的
          #      - 保留: kotlinx/serialization (LiveKit 需要)
          #
          # 白名单保护 (这些不会被删除):
          #   io/livekit/  livekit/org/webrtc/  org/webrtc/  com/livekit/
          #   kotlinx/serialization (LiveKit JSON 序列化依赖)
          echo ""
          echo "[Step 3c] v8 Conservative Full Pack (no blacklist)..."
          
          # v8: Conservative Full Pack - remove known HBuilderX conflicts + _COROUTINE
          TOTAL_CLASSES=$(find "$MERGED_CLASSES" -name "*.class" 2>/dev/null | wc -l)
          STRIPPED_PKGS=""

          # 删除与 HBuilderX 基座冲突的包（HBuilderX 已内置这些库的不同版本）
          for CONFLICT_PKG in okhttp3 okio org/intellij/lang/annotations org/jetbrains/annotations; do
            if [ -d "$MERGED_CLASSES/$CONFLICT_PKG" ]; then
              cnt=$(find "$MERGED_CLASSES/$CONFLICT_PKG" -name "*.class" 2>/dev/null | wc -l)
              rm -rf "$MERGED_CLASSES/$CONFLICT_PKG" 2>/dev/null || true
              STRIPPED_PKGS="${STRIPPED_PKGS}    ${CONFLICT_PKG}/ (${cnt} classes)\n"
            fi
          done

          if [ -d "$MERGED_CLASSES/_COROUTINE" ]; then
            coro_cnt=$(find "$MERGED_CLASSES/_COROUTINE" -name "*.class" 2>/dev/null | wc -l)
            rm -rf "$MERGED_CLASSES/_COROUTINE" 2>/dev/null || true
            STRIPPED_PKGS="${STRIPPED_PKGS}    _COROUTINE/ ($coro_cnt classes)\n"
          fi

          FINAL_CLASSES=$(find "$MERGED_CLASSES" -name "*.class" 2>/dev/null | wc -l)
          echo "  Merged: $TOTAL_CLASSES | Packed: $FINAL_CLASSES classes (full deps preserved)"
          [ -n "$STRIPPED_PKGS" ] && echo -e "  Removed (known conflicts only):\n$STRIPPED_PKGS"

          echo ""
          echo "  Top-level packages in AAR:"
          find "$MERGED_CLASSES" -maxdepth 1 -type d ! -name "." 2>/dev/null | while read pkg; do
            pcnt=$(find "$pkg" -name "*.class" 2>/dev/null | wc -l)
            [ "$pcnt" -gt 0 ] && echo "    $(basename $pkg)/ ($pcnt)"
          done

          echo ""
          echo "[Step 3d] Critical dependency check:"
          for dep in "io/livekit|LiveKit core" "com/livekit|Plugin" \
                    "livekit/org/webrtc|Repackaged WebRTC package" \
                    "livekit/org/webrtc/PeerConnectionFactory.class|Repackaged WebRTC key class" \
                    "org/webrtc|WebRTC(opt)" \
                    "kotlinx/serialization|Serialization(JSON)" "android/javax/sdp|SDP Factory"; do
            p="${dep%%|*}"; d="${dep##*|}"
            if [ -d "$MERGED_CLASSES/$p" ]; then
              c=$(find "$MERGED_CLASSES/$p" -name "*.class" 2>/dev/null | wc -l)
              echo "  OK $p/ ($c) — $d"
            elif [ -f "$MERGED_CLASSES/$p" ]; then
              echo "  OK $p — $d"
            else
              echo "  MISS $p — $d"
            fi
          done

          # ---- Step 3e: 创建 classes.jar (只包含 .class 文件) ----
          CLASSES_OUT="$WORK/classes.jar"
          echo "[Step 3e] Creating classes.jar (class files only)..."

          PACKED_CNT=$(find "$MERGED_CLASSES" -name "*.class" 2>/dev/null | wc -l)
          (cd "$MERGED_CLASSES" && \
            find . -name "*.class" | zip -q "$CLASSES_OUT" -@ )
          CLS_SIZE=$(du -h "$CLASSES_OUT" | cut -f1)
          CLS_CREATED=$(unzip -l "$CLASSES_OUT" 2>/dev/null | grep "\.class$" | wc -l)
          echo "  ✓ classes.jar created: $CLS_SIZE ($CLS_CREATED/$PACKED_CNT class files)"
          if [ "$CLS_CREATED" -lt 100 ]; then
            echo "  ✗ FAIL: classes.jar contains too few class files!"
            exit 1
          fi

          # ---- Step 4: 合并 .so 文件 (WebRTC native libs) ----
          echo ""
          echo "[Step 4] Merging .so files..."
          JNI_DIR="$WORK/jni"
          mkdir -p "$JNI_DIR"
          SO_COUNT=0

          # 从插件自身 AAR 提取 .so
          if [ -d "$PLUGIN_EXTRACT/jni" ]; then
            cp -r "$PLUGIN_EXTRACT/jni/"* "$JNI_DIR/" 2>/dev/null || true
            PLUGIN_SO=$(find "$JNI_DIR" -name "*.so" 2>/dev/null | wc -l)
            echo "  Plugin .so: $PLUGIN_SO"
            SO_COUNT=$((SO_COUNT + PLUGIN_SO))
          fi

          # 从 LiveKit SDK AAR 提取 .so
          if [ -d "$LIVEKIT_DIR/jni" ]; then
            for arch_dir in "$LIVEKIT_DIR/jni/"*/; do
              [ -d "$arch_dir" ] || continue
              ARCH=$(basename "$arch_dir")
              mkdir -p "$JNI_DIR/$ARCH"
              cp "$arch_dir"*.so "$JNI_DIR/$ARCH/" 2>/dev/null || true
            done
            LK_SO=$(find "$LIVEKIT_DIR/jni" -name "*.so" 2>/dev/null | wc -l)
            echo "  LiveKit .so: $LK_SO"
            SO_COUNT=$((SO_COUNT + LK_SO))
          fi

          # 从 WebRTC AAR 提取 .so
          if [ -d "$WEBRTC_DIR/jni" ]; then
            for arch_dir in "$WEBRTC_DIR/jni/"*/; do
              [ -d "$arch_dir" ] || continue
              ARCH=$(basename "$arch_dir")
              mkdir -p "$JNI_DIR/$ARCH"
              cp "$arch_dir"*.so "$JNI_DIR/$ARCH/" 2>/dev/null || true
            done
            WC_SO=$(find "$WEBRTC_DIR/jni" -name "*.so" 2>/dev/null | wc -l)
            echo "  WebRTC .so: $WC_SO"
            SO_COUNT=$((SO_COUNT + WC_SO))
          fi

          # 从所有依赖 AAR 中提取 .so (遍历 deps-runtime.txt)
          if [ -f "$ANDROID_ROOT/build/exports/deps-runtime.txt" ]; then
            while IFS= read -r DEP_PATH; do
              [ -f "$DEP_PATH" ] || continue
              [[ "$DEP_PATH" == *.aar ]] || continue
              TMP_SO="$WORK/so-tmp-$RANDOM"
              unzip -qo "$DEP_PATH" -d "$TMP_SO" 2>/dev/null || true
              if [ -d "$TMP_SO/jni" ]; then
                for arch_dir in "$TMP_SO/jni/"*/; do
                  [ -d "$arch_dir" ] || continue
                  ARCH=$(basename "$arch_dir")
                  mkdir -p "$JNI_DIR/$ARCH"
                  cp "$arch_dir"*.so "$JNI_DIR/$ARCH/" 2>/dev/null || true
                done
              fi
              rm -rf "$TMP_SO"
            done < "$ANDROID_ROOT/build/exports/deps-runtime.txt"
          fi

          # UniApp 云打包只声明 armeabi-v7a + arm64-v8a，删除模拟器 ABI，显著降低 AAR 体积
          find "$JNI_DIR" -mindepth 1 -maxdepth 1 -type d ! -name "armeabi-v7a" ! -name "arm64-v8a" -exec rm -rf {} + 2>/dev/null || true

          SO_COUNT=$(find "$JNI_DIR" -name "*.so" 2>/dev/null | wc -l)
          echo "  Total .so files: $SO_COUNT"

          if [ "$SO_COUNT" -gt 0 ]; then
            echo "  Architectures:"
            find "$JNI_DIR" -mindepth 1 -maxdepth 1 -type d | while read arch; do
              scnt=$(find "$arch" -name "*.so" 2>/dev/null | wc -l)
              ssize=$(du -sh "$arch" 2>/dev/null | cut -f1)
              [ "$scnt" -gt 0 ] && echo "    $(basename $arch)/ ($scnt files, $ssize)"
            done
          fi

          # ---- Step 5: 组装最终 Fat AAR ----
          FAT_AAR="$ANDROID_ROOT/livekit-c2c-fat.aar"
          echo ""
          echo "[Step 5] Assembling final Fat AAR..."

          rm -f "$FAT_AAR"
          mkdir -p "$WORK/fat-aar"

          # AndroidManifest.xml
          if [ -f "$PLUGIN_EXTRACT/AndroidManifest.xml" ]; then
            cp "$PLUGIN_EXTRACT/AndroidManifest.xml" "$WORK/fat-aar/"
          else
            echo '<manifest package="com.livekit.c2ccall"/>' > "$WORK/fat-aar/AndroidManifest.xml"
          fi

          # classes.jar
          cp "$CLASSES_OUT" "$WORK/fat-aar/classes.jar"

          # .so files
          if [ "$SO_COUNT" -gt 0 ] && [ -d "$JNI_DIR" ]; then
            cp -r "$JNI_DIR" "$WORK/fat-aar/jni"
          fi

          # res (从插件 AAR)
          if [ -d "$PLUGIN_EXTRACT/res" ]; then
            cp -r "$PLUGIN_EXTRACT/res" "$WORK/fat-aar/"
          fi

          # 打包成 AAR
          (cd "$WORK/fat-aar" && jar cf "$FAT_AAR" .)

          FAT_SIZE=$(du -h "$FAT_AAR" | cut -f1)
          FAT_CLASSES=$(unzip -l "$CLASSES_OUT" 2>/dev/null | grep "\.class$" | wc -l)
          FAT_SO=$(unzip -l "$FAT_AAR" 2>/dev/null | grep "\.so$" | wc -l)
          echo "  ✓ Fat AAR: $FAT_SIZE ($FAT_CLASSES classes inside classes.jar, $FAT_SO .so)"
          echo "  Path: $FAT_AAR"

          # ---- Step 6: 验证 AAR ----
          echo ""
          echo "[Step 6] Verifying Fat AAR..."

          ERRORS=0
          VERIFY_CLASSES_JAR="$WORK/verify-classes.jar"

          # 检查 classes.jar 存在且非空；嵌套 ZIP 不能直接通过 /dev/stdin 给 unzip 校验，必须先落盘
          if ! unzip -l "$FAT_AAR" 2>/dev/null | grep -q "classes.jar"; then
            echo "  ✗ FAIL: No classes.jar in AAR!"
            ERRORS=$((ERRORS + 1))
          elif ! unzip -p "$FAT_AAR" classes.jar > "$VERIFY_CLASSES_JAR" 2>/dev/null || [ ! -s "$VERIFY_CLASSES_JAR" ]; then
            echo "  ✗ FAIL: classes.jar in AAR is empty or unreadable!"
            ERRORS=$((ERRORS + 1))
          else
            CLS_IN_AAR=$(unzip -l "$VERIFY_CLASSES_JAR" 2>/dev/null | grep "\.class$" | wc -l)
            echo "  ✓ classes.jar present ($CLS_IN_AAR classes inside)"
            if [ "$CLS_IN_AAR" -lt 100 ]; then
              echo "  ✗ FAIL: Very few classes in AAR (expected 1000+ for full-fat)"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # 检查关键类存在
          echo "  Checking critical classes inside AAR:"
          for check_item in "io/livekit/.*[.]class$::io/livekit/*" \
                            "com/livekit/.*[.]class$::com/livekit/*" \
                            "kotlinx/serialization/json/JsonKt[.]class$::kotlinx/serialization/json/JsonKt.class" \
                            "livekit/org/webrtc/PeerConnectionFactory[.]class$::livekit/org/webrtc/PeerConnectionFactory.class"; do
            check_pattern="${check_item%%::*}"
            check_label="${check_item##*::}"
            if [ -f "$VERIFY_CLASSES_JAR" ] && unzip -l "$VERIFY_CLASSES_JAR" 2>/dev/null | grep -Eq "$check_pattern"; then
              echo "    ✓ $check_label"
            else
              echo "    ✗ MISSING: $check_label"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # 检查 AndroidManifest.xml
          if ! unzip -l "$FAT_AAR" 2>/dev/null | grep -q "AndroidManifest.xml"; then
            echo "  ✗ FAIL: No AndroidManifest.xml!"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "  ✗ VERIFICATION FAILED with $ERRORS error(s)!"
            exit 1
          fi

          echo "  ✓ Verification PASSED"

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: android/livekit-c2c-fat.aar
          if-no-files-found: error
          retention-days: 1

      - name: Confirm Android build
        if: always()
        run: echo "Android AAR build completed (check above for errors)"

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create stub DCUniModule framework
        run: |
          FRAMEWORK_DIR=ci-stubs/build/DCUniModule.framework
          mkdir -p "$FRAMEWORK_DIR/Headers"
          
          cp ci-stubs/ios/DCUniModule.h "$FRAMEWORK_DIR/Headers/"
          
          echo "void _stub() {}" > /tmp/stub.c
          cc -c /tmp/stub.c -o /tmp/stub.o -arch arm64
          ar rcs "$FRAMEWORK_DIR/DCUniModule" /tmp/stub.o
          
          cat > "$FRAMEWORK_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>DCUniModule</string>
              <key>CFBundleIdentifier</key>
              <string>com.dcloud.DCUniModule</string>
              <key>CFBundleName</key>
              <string>DCUniModule</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          PLIST
          
          sudo cp -R "$FRAMEWORK_DIR" /Library/Frameworks/

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build iOS Framework
        run: |
          set -e
          
          cat > ios/project.yml << 'YML'
          name: LiveKitC2CCall
          options:
            bundleIdPrefix: com.livekit
            deploymentTarget:
              iOS: "14.0"
            xcodeVersion: "15.0"
          targets:
            LiveKitC2CCall:
              type: framework
              platform: iOS
              sources:
                - path: Classes
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.livekit.c2ccall
                INFOPLIST_FILE: Info.plist
                VALID_ARCHS: arm64
                ONLY_ACTIVE_ARCH: YES
                SKIP_INSTALL: YES
                BUILD_LIBRARY_FOR_DISTRIBUTION: YES
                TARGETED_DEVICE_FAMILY: "1,2"
                OTHER_LDFLAGS: "-framework DCUniModule"
                OTHER_CFLAGS: "-I/Library/Frameworks/DCUniModule.framework/Headers"
                LIBRARY_SEARCH_PATHS: "/Library/Frameworks"
                CLANG_ENABLE_MODULES: YES
              headers:
                - path: Classes/LiveKitC2CCallModule.h
                  public: true
          YML
          
          cd ios
          echo "=== Generating Xcode project ==="
          xcodegen generate
          echo "=== Generated files ==="
          ls -la
          
          echo "=== Building iOS Framework ==="
          xcodebuild \
            -project LiveKitC2CCall.xcodeproj \
            -scheme LiveKitC2CCall \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            ONLY_ACTIVE_ARCH=YES \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== xcodebuild exit code: $BUILD_EXIT_CODE ==="
          
          echo "=== Checking build output ==="
          ls -laR build/ 2>/dev/null || echo "No build directory!"
          
      - name: Verify iOS Framework
        run: |
          echo "=== Verifying iOS Framework at ios/build/LiveKitC2CCall.framework ==="
          if [ ! -d "ios/build/LiveKitC2CCall.framework" ]; then
            echo "ERROR: Framework directory not found!"
            echo "--- Last 80 lines of iOS build log ---"
            tail -80 ios/build.log 2>/dev/null || echo "No build log found"
            exit 1
          fi
          
          echo "=== Framework contents ==="
          ls -laR ios/build/LiveKitC2CCall.framework/
          
          # 检查 framework 二进制文件是否存在且非空
          BINARY="ios/build/LiveKitC2CCall.framework/LiveKitC2CCall"
          if [ ! -f "$BINARY" ]; then
            # 尝试其他可能的二进制名称
            BINARY=$(find ios/build/LiveKitC2CCall.framework -type f -name "LiveKitC2CCall*" ! -name "*.h" 2>/dev/null | head -1)
          fi
          
          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "WARNING: No binary found in framework"
          else
            echo "=== Binary file: $BINARY ==="
            ls -la "$BINARY"
            file "$BINARY"
            BINARY_SIZE=$(stat -f%z "$BINARY" 2>/dev/null || stat -c%s "$BINARY" 2>/dev/null)
            echo "Binary size: ${BINARY_SIZE} bytes"
            if [ "$BINARY_SIZE" -lt 1000 ]; then
              echo "ERROR: Framework binary suspiciously small (${BINARY_SIZE} bytes)"
              exit 1
            fi
          fi
          
          # 检查总大小
          TOTAL_SIZE=$(du -sk ios/build/LiveKitC2CCall.framework | cut -f1)
          echo "Total framework size: ${TOTAL_SIZE} KB"
          if [ "$TOTAL_SIZE" -lt 10 ]; then
            echo "ERROR: Framework total size too small (${TOTAL_SIZE} KB), likely incomplete"
            exit 1
          fi
          
          echo "=== iOS Framework verification PASSED ==="

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ios/build/LiveKitC2CCall.framework/
          if-no-files-found: error
          retention-days: 1

      - name: Confirm iOS upload
        if: always()
        run: echo "iOS Framework upload step completed (check above for errors)"

  package:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: List available artifacts
        run: |
          echo "=== Listing all workflow artifacts ==="
          echo "Workflow run ID: $GITHUB_RUN_ID"
          echo "Attempting download from dependent jobs..."

      - name: Download Android AAR
        uses: actions/download-artifact@v4
        continue-on-error: false
        with:
          name: android-aar
          path: artifacts/android/

      - name: Verify Android AAR download
        run: |
          echo "=== Checking downloaded AAR ==="
          ls -laR artifacts/android/
          if [ ! -f "artifacts/android/livekit-c2c-fat.aar" ] && [ -z "$(ls -A artifacts/android/ 2>/dev/null)" ]; then
            echo "ERROR: Android AAR directory is empty or files missing!"
            exit 1
          fi
          echo "Download verification passed"

      - name: Download iOS Framework
        uses: actions/download-artifact@v4
        with:
          name: ios-framework
          path: artifacts/ios/

      - name: Verify iOS Framework download
        run: |
          echo "=== Checking downloaded iOS artifact ==="
          ls -laR artifacts/ios/ 2>/dev/null || { echo "ERROR: ios artifacts directory empty or missing!"; exit 1; }
          
          # 检查 framework 目录是否存在（artifact 下载可能展开为内部文件）
          if [ -d "artifacts/ios/LiveKitC2CCall.framework" ]; then
            echo "✓ LiveKitC2CCall.framework found"
          else
            # 可能 artifact 直接展开了框架内容，尝试重建目录结构
            echo "Framework directory not found directly. Checking contents..."
            echo "Files in artifacts/ios/:"
            find artifacts/ios/ -type f 2>/dev/null | head -20
            
            # 如果有 Info.plist 或二进制文件但缺少 .framework 包装
            if [ -f "artifacts/ios/Info.plist" ] || [ -f "artifacts/ios/LiveKitC2CCall" ]; then
              echo "Reconstructing .framework structure from flat contents..."
              mkdir -p artifacts/ios_reconstructed/LiveKitC2CCall.framework/Headers
              # 移动文件到正确的 framework 结构中
              if [ -f "artifacts/ios/Info.plist" ]; then
                mv artifacts/ios/Info.plist artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/LiveKitC2CCall" ]; then
                mv artifacts/ios/LiveKitC2CCall artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              if [ -f "artifacts/ios/Headers/LiveKitC2CCallModule.h" ]; then
                mv artifacts/ios/Headers artifacts/ios_reconstructed/LiveKitC2CCall.framework/
              fi
              rm -rf artifacts/ios
              mv artifacts/ios_reconstructed artifacts/ios
              echo "Reconstruction complete:"
              ls -laR artifacts/ios/
            else
              echo "ERROR: Cannot find valid iOS framework content in downloaded artifact!"
              exit 1
            fi
          fi
          
          echo "iOS download verification passed"

      - name: Assemble plugin package
        run: |
          mkdir -p android ios
          cp artifacts/android/livekit-c2c-fat.aar android/livekit-c2c.aar
          cp -R artifacts/ios/LiveKitC2CCall.framework ios/

          rm -rf ci-stubs .github
          rm -f android/build.gradle android/settings.gradle android/proguard-rules.pro
          rm -rf android/gradle android/src
          rm -f ios/Podfile ios/LiveKitC2CCall.podspec ios/project.yml
          rm -rf ios/Classes ios/Info.plist
          rm -rf artifacts

          # 在 GITHUB_WORKSPACE 内直接打包，避免 cd .. 导致路径混乱
          zip -r LiveKit-C2CCall-v1.0.0.zip ./ \
            -x "DEVELOPMENT.md" ".git/*"

          echo "=== ZIP created ==="
          ls -la LiveKit-C2CCall-v1.0.0.zip
          unzip -l LiveKit-C2CCall-v1.0.0.zip | head -30

      - name: Upload plugin ZIP (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: livekit-c2c-plugin
          path: LiveKit-C2CCall-v1.0.0.zip
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: LiveKit-C2CCall v1.0.0
          body: |
            ## uni-app 原生插件自动构建产物

            **构建时间**: ${{ github.run_started_at }}
            **Commit**: ${{ github.sha }}
            **触发**: ${{ github.event_name }}

            ### 下载说明

            | 文件 | 说明 |
            |------|------|
            `LiveKit-C2CCall-v1.0.0.zip` | 完整插件包（含 Android + iOS），解压后放入 UniApp 项目 `nativeplugins/` 目录即可 |

            > 解压后目录结构：`LiveKit-C2CCall/android/livekit-c2c.aar` + `LiveKit-C2CCall/ios/LiveKitC2CCall.framework`
          files: LiveKit-C2CCall-v1.0.0.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
