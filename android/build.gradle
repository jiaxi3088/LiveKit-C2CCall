buildscript {
    ext.kotlin_version = '1.9.22'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.2.2"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

plugins {
    id 'com.android.library'
}

android {
    namespace "com.livekit.c2ccall"
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // LiveKit SDK 是 Kotlin 编写的，需要启用 Kotlin 支持
    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/libwebrtc.so'
        merge '**/META-INF/*.pro'
    }

    lintOptions {
        abortOnError false
    }
}

dependencies {
    // LiveKit Android SDK（核心依赖）
    implementation 'io.livekit:livekit-android-sdk:2.0.0'

    // AndroidX（LiveKit SDK 依赖）
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-common:2.7.0'

    // uni-app SDK（编译时由 HBuilderX 提供，此处仅做类型引用）
    compileOnly fileTree(dir: '../libs', include: ['uniapp-v8-release.aar'])
}
