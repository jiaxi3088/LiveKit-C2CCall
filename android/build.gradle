plugins {
    id 'com.android.library' version '8.7.3'
    id 'org.jetbrains.kotlin.android' version '2.0.21'
}

android {
    namespace "com.livekit.c2ccall"
    compileSdk 35

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so', '**/libwebrtc.so']
        }
        resources {
            merges += ['**/META-INF/*.pro']
        }
    }
}

// ========== Fat AAR 构建：将所有依赖打入最终 AAR ==========
// 核心原理：创建一个可解析（resolvable）配置来收集运行时依赖的所有 artifact 文件
configurations {
    // 声明式配置：依赖写在这里（不可解析，仅用于编译）
    fatAarImplementation

    // 可解析配置：继承上面的依赖，在 embedDependencies 中解析获取实际文件
    fatAarClasspath {
        canBeResolved = true
        canBeConsumed = false
    }
}

// 确保 implementation 继承 fatAarImplementation（编译时可用）
// 同时 fatAarClasspath 也继承它（打包时解析用）
afterEvaluate {
    configurations.implementation.extendsFrom(configurations.fatAarImplementation)
    configurations.fatAarClasspath.extendsFrom(configurations.fatAarImplementation)
}

dependencies {
    // LiveKit Android SDK - 用 fatAarImplementation 确保打包进 AAR
    fatAarImplementation 'io.livekit:livekit-android:2.25.1'

    // AndroidX（LiveKit SDK 的传递依赖，也需打包）
    fatAarImplementation 'androidx.appcompat:appcompat:1.6.1'
    fatAarImplementation 'androidx.core:core-ktx:1.13.1'
    fatAarImplementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    fatAarImplementation 'androidx.lifecycle:lifecycle-common:2.8.7'

    // uni-app SDK（仅编译用，不打包）
    compileOnly fileTree(dir: '../libs', include: ['uniapp-v8-release.aar'])
}

tasks.register('embedDependencies') {
    group = 'build'
    description = 'Embed all runtime dependencies into the release AAR (Fat AAR)'

    doLast {
        def outputDir = file("${buildDir}/outputs/aar")
        def aarFile = outputDir.listFiles()?.find { it.name.endsWith('-release.aar') }
        if (!aarFile) {
            throw new GradleException("Release AAR not found in ${outputDir}")
        }

        def originalSize = aarFile.length()
        println "Original AAR size: ${originalSize / 1024} KB"

        def stagingDir = file("${buildDir}/fat-aar-staging")
        stagingDir.deleteDir()
        stagingDir.mkdirs()

        println "========================================"
        println "=== Embedding dependencies into ${aarFile.name} ==="
        println "========================================"

        // 解压原 AAR
        copy {
            from zipTree(aarFile)
            into stagingDir
        }

        // ========== 使用可解析配置收集所有依赖（含传递依赖）==========
        def resolveConfig = configurations.fatAarClasspath
        println "[resolve] Using fatAarClasspath config (resolvable=${resolveConfig.canBeResolved})"

        def allArtifacts = []
        def seenFiles = new HashSet<String>()

        resolveConfig.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def file = artifact.file
            if (file?.exists() && !seenFiles.contains(file.absolutePath)) {
                if (file.name.endsWith('.jar') || file.name.endsWith('.aar')) {
                    allArtifacts.add(file)
                    seenFiles.add(file.absolutePath)
                }
            }
        }

        println ""
        println "Found ${allArtifacts.size()} artifacts to embed:"
        allArtifacts.each { f ->
            println "  + ${f.name} (${f.size() / 1024} KB)"
        }
        println ""

        if (allArtifacts.isEmpty()) {
            throw new GradleException("""
                !!! FATAL: No dependencies found from fatAarClasspath configuration! !!!
                This means fatAarImplementation dependencies were NOT resolved.
                Check that:
                  1. Dependencies are declared with 'fatAarImplementation' (not 'implementation')
                  2. The fatAarClasspath configuration is properly set up as resolvable
                  3. Maven repositories are accessible
                AAR will be only ~28KB and app WILL crash at runtime!
            """.stripIndent())
        }

        // ===== 第一步：合并所有 classes.jar =====
        def jarSources = []
        jarSources.add(file("${stagingDir}/classes.jar"))
        println "  [base] Original classes.jar (${new File(stagingDir, 'classes.jar').length() / 1024} KB)"

        allArtifacts.each { dep ->
            if (dep.name.endsWith('.aar')) {
                def extractDir = file("${buildDir}/dep-extract-${dep.name.hashCode()}")
                extractDir.deleteDir()
                copy { from zipTree(dep); into extractDir }

                def classesJar = file("${extractDir}/classes.jar")
                if (classesJar.exists()) {
                    jarSources.add(classesJar)
                    println "  [+jar] ${dep.name} -> classes.jar (${classesJar.length() / 1024} KB)"
                } else {
                    println "  [skip] ${dep.name} (no classes.jar inside AAR)"
                }
            } else if (dep.name.endsWith('.jar')) {
                jarSources.add(dep)
                println "  [+jar] ${dep.name} (${dep.length() / 1024} KB)"
            }
        }

        // 合并所有 JAR 为一个 classes.jar
        def mergedJar = file("${stagingDir}/classes-merged.jar")
        ant.jar(destfile: mergedJar, index: true, manifest: "${stagingDir}/manifest") {
            jarSources.each { src ->
                zipfileset(src: src)
            }
        }

        ant.move(file: "${stagingDir}/classes.jar", tofile: "${stagingDir}/classes-old.jar", failonerror: false)
        ant.move(file: mergedJar, tofile: "${stagingDir}/classes.jar")
        println ""
        println "  [merge] Merged classes.jar (${new File(stagingDir, 'classes.jar').length() / 1024} KB)"

        // ===== 第二步：嵌入 JNI .so 原生库（WebRTC 等）=====
        println ""
        println "  === Collecting native libraries (.so) ==="
        def targetJni = file("${stagingDir}/jni")
        targetJni.mkdirs()

        def soCount = 0
        allArtifacts.each { dep ->
            def extractDir = file("${buildDir}/jni-extract-${dep.name.hashCode()}")
            extractDir.deleteDir()

            try {
                copy { from zipTree(dep); into extractDir }

                def srcJni = null
                for (loc in ['jni', 'lib', 'jniLibs']) {
                    def candidate = file("${extractDir}/${loc}")
                    if (candidate.exists()) { srcJni = candidate; break }
                }

                if (srcJni?.exists()) {
                    srcJni.eachDirRecurse { abiDir ->
                        def relPath = srcJni.toURI().relativize(abiDir.toURI()).toString()
                        abiDir.eachFileMatch(~/.*\.so/) { soFile ->
                            copy { from soFile; into "${targetJni}/${relPath}" }
                            println "  [+so] ${relPath}/${soFile.name} (${soFile.length() / 1024} KB)"
                            soCount++
                        }
                    }
                }
            } catch (e) {
                println "  [warn] JNI extraction failed for ${dep.name}: ${e.message}"
            } finally {
                extractDir.deleteDir()
            }
        }
        println "  Total .so files embedded: $soCount"

        // 清理临时目录
        file("${buildDir}").eachDir { d ->
            if (d.name.startsWith('dep-extract-') || d.name.startsWith('jni-extract-')) {
                d.deleteDir()
            }
        }

        // ===== 第三步：重新打包 AAR =====
        ant.zip(destfile: aarFile, compress: true) {
            fileset(dir: stagingDir) {
                exclude(name: 'classes-old.jar')
            }
        }

        def newSize = aarFile.length()
        def newSizeKB = newSize.intdiv(1024)
        def newSizeMB = (newSize / (1024 * 1024)).round(1)

        println ""
        println "========================================"
        println "=== Fat AAR created successfully ==="
        println "  File:    ${aarFile.name}"
        println "  Before:  ${originalSize.intdiv(1024)} KB"
        println "  After:   ${newSizeKB} KB (~${newSizeMB} MB)"
        println "  Deps:    ${allArtifacts.size()} artifacts"
        println "  .so:     $soCount native libs"
        println "========================================"

        stagingDir.deleteDir()
    }
}

afterEvaluate {
    tasks.named('assembleRelease').configure { finalizedBy 'embedDependencies' }
}
