plugins {
    id 'com.android.library' version '8.7.3'
    id 'org.jetbrains.kotlin.android' version '2.0.21'
}

android {
    namespace "com.livekit.c2ccall"
    compileSdk 35

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so', '**/libwebrtc.so']
        }
        resources {
            merges += ['**/META-INF/*.pro']
        }
    }
}

// ========== Fat AAR 构建：将所有依赖打入最终 AAR ==========
configurations {
    // 收集需要打包进 AAR 的运行时依赖
    fatAarImplementation
}
afterEvaluate {
    configurations.implementation.extendsFrom(configurations.fatAarImplementation)
}

dependencies {
    // LiveKit Android SDK - 用 fatAarImplementation 确保打包进 AAR
    fatAarImplementation 'io.livekit:livekit-android:2.25.1'

    // AndroidX（LiveKit SDK 的传递依赖，也需打包）
    fatAarImplementation 'androidx.appcompat:appcompat:1.6.1'
    fatAarImplementation 'androidx.core:core-ktx:1.13.1'
    fatAarImplementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    fatAarImplementation 'androidx.lifecycle:lifecycle-common:2.8.7'

    // uni-app SDK（仅编译用，不打包）
    compileOnly fileTree(dir: '../libs', include: ['uniapp-v8-release.aar'])
}

tasks.register('embedDependencies') {
    group = 'build'
    description = 'Embed all runtime dependencies into the release AAR'

    doLast {
        def outputDir = file("${buildDir}/outputs/aar")
        def aarFile = outputDir.listFiles()?.find { it.name.endsWith('-release.aar') }
        if (!aarFile) {
            throw new GradleException("Release AAR not found in ${outputDir}")
        }

        def stagingDir = file("${buildDir}/fat-aar-staging")
        stagingDir.deleteDir()
        stagingDir.mkdirs()

        println "========================================"
        println "=== Embedding dependencies into ${aarFile.name} ==="
        println "========================================"

        // 解压原 AAR
        copy {
            from zipTree(aarFile)
            into stagingDir
        }

        // 收集所有运行时依赖（包括传递依赖），使用 runtimeClasspath 确保完整依赖树
        def runtimeConfig = configurations.runtimeClasspath
            ?: configurations.getByName('releaseRuntimeClasspath')
        
        def allArtifacts = []
        def seenFiles = new HashSet<String>()

        runtimeConfig.resolvedConfiguration.resolvedArtifacts.each { artifact ->
            def file = artifact.file
            if (file?.exists() && !seenFiles.contains(file.absolutePath)) {
                if (file.name.endsWith('.jar') || file.name.endsWith('.aar')) {
                    allArtifacts.add(file)
                    seenFiles.add(file.absolutePath)
                }
            }
        }

        println ""
        println "Found ${allArtifacts.size()} artifacts to process:"
        allArtifacts.each { f ->
            println "  + ${f.name} (${f.size() / 1024} KB)"
        }
        println ""

        if (allArtifacts.isEmpty()) {
            println "  WARNING: No dependencies found to embed!"
        } else {
            // ===== 第一步：合并所有 classes.jar / classes.jar (from aar) =====
            def jarSources = []
            
            // 先加入原 AAR 的 classes.jar
            jarSources.add(file("${stagingDir}/classes.jar"))
            println "  [base] Original classes.jar"

            // 提取每个依赖的类文件
            allArtifacts.each { dep ->
                if (dep.name.endsWith('.aar')) {
                    def extractDir = file("${buildDir}/dep-extract-${System.nanoTime()}-${dep.name.hashCode()}")
                    extractDir.deleteDir()
                    copy { from zipTree(dep); into extractDir }
                    
                    def classesJar = file("${extractDir}/classes.jar")
                    if (classesJar.exists()) {
                        jarSources.add(classesJar)
                        println "  [+jar] ${dep.name} -> classes.jar (${classesJar.length() / 1024} KB)"
                    }
                } else if (dep.name.endsWith('.jar')) {
                    jarSources.add(dep)
                    println "  [+jar] ${dep.name} (${dep.length() / 1024} KB)"
                }
            }

            // 合并所有 JAR
            def mergedJar = file("${stagingDir}/classes-merged.jar")
            ant.jar(destfile: mergedJar, index: true, manifest: "${stagingDir}/manifest") {
                jarSources.each { src ->
                    zipfileset(src: src)
                }
            }

            // 替换原 classes.jar
            ant.move(file: "${stagingDir}/classes.jar", tofile: "${stagingDir}/classes-old.jar", failonerror: false)
            ant.move(file: mergedJar, tofile: "${stagingDir}/classes.jar")
            println ""
            println "  [merge] Merged into single classes.jar (${new File("${stagingDir}/classes.jar").length() / 1024} KB)"

            // ===== 第二步：收集并嵌入所有 JNI .so 原生库 =====
            println ""
            println "  === Collecting native libraries (.so) ==="

            def targetJni = file("${stagingDir}/jni")
            targetJni.mkdirs()

            def soCount = 0
            allArtifacts.each { dep ->
                def extractDir = file("${buildDir}/jni-extract-${System.nanoTime()}-${dep.name.hashCode()}")
                extractDir.deleteDir()
                
                try {
                    copy { from zipTree(dep); into extractDir }
                    
                    def srcJni = file("${extractDir}/jni")
                    if (!srcJni.exists()) {
                        // 有些 AAR 把 .so 放在 lib/ 目录下
                        srcJni = file("${extractDir}/lib")
                    }
                    
                    if (srcJni.exists()) {
                        // 遍历所有 ABI 子目录
                        srcJni.eachDirRecurse { abiDir ->
                            def relativePath = srcJni.toURI().relativize(abiDir.toURI()).toString()
                            abiDir.eachFileMatch(~/.*\.so/) { soFile ->
                                def destPath = "${targetJni}/${relativePath}/${soFile.name}"
                                copy {
                                    from soFile
                                    into "${targetJni}/${relativePath}"
                                }
                                println "  [+so] ${relativePath}/${soFile.name} (${soFile.length() / 1024} KB)"
                                soCount++
                            }
                        }
                    }
                } catch (e) {
                    println "  [warn] Failed to extract JNI from ${dep.name}: ${e.message}"
                } finally {
                    extractDir.deleteDir()
                }
            }

            println "  Total .so files embedded: $soCount"

            // 清理临时提取目录
            file("${buildDir}").eachDir { dir ->
                if (dir.name.startsWith('dep-extract-') || dir.name.startsWith('jni-extract-') ||
                    dir.name.startsWith('aar-extract-') || dir.name.startsWith('aar-jni-')) {
                    dir.deleteDir()
                }
            }
        }

        // ===== 第三步：重新打包 AAR =====
        ant.zip(destfile: aarFile, compress: true) {
            fileset(dir: stagingDir) {
                exclude(name: 'classes-old.jar')
            }
        }

        def newSize = aarFile.length()
        def newSizeKB = (newSize / 1024).round()
        def newSizeMB = (newSize / (1024 * 1024)).round() * 10 / 10.0
        
        println ""
        println "========================================"
        println "=== Fat AAR created successfully! ==="
        println "  File: ${aarFile.name}"
        println "  Size: ${newSizeKB} KB (~${newSizeMB} MB)"
        println "  Dependencies: ${allArtifacts.size()}"
        println "========================================"
        
        stagingDir.deleteDir()
    }
}

afterEvaluate {
    tasks.named('assembleRelease').configure { finalizedBy 'embedDependencies' }
}
