plugins {
    id 'com.android.library' version '8.7.3'
    id 'org.jetbrains.kotlin.android' version '2.0.21'
}

android {
    namespace "com.livekit.c2ccall"
    compileSdk 35

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packaging {
        jniLibs {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so', '**/libwebrtc.so']
        }
        resources {
            merges += ['**/META-INF/*.pro']
        }
    }
}

dependencies {
    // LiveKit Android SDK + 所有依赖 — CI 中用 Shell 脚本打入 AAR（Fat AAR）
    implementation 'io.livekit:livekit-android:2.25.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    implementation 'androidx.lifecycle:lifecycle-common:2.8.7'

    // uni-app SDK（仅编译用）
    compileOnly fileTree(dir: '../libs', include: ['uniapp-v8-release.aar'])
}

// Fat AAR 由 CI Shell 脚本完成，见 .github/workflows/build.yml 的 "Create Fat AAR" 步骤

// 导出运行时依赖文件列表供 CI Shell 脚本使用
tasks.register('exportDeps') {
    doLast {
        def rtc = configurations.findByName('releaseRuntimeClasspath')
        if (rtc == null) {
            rtc = configurations.findByName('runtimeClasspath')
        }
        if (rtc != null && rtc.canBeResolved) {
            def outFile = file("${buildDir}/dep-files.txt")
            outFile.text = rtc.files.findAll { it.exists() }.collect { it.absolutePath }.join('\n')
            println "Exported ${rtc.files.size()} files to dep-files.txt"
        } else {
            // 回退：扫描所有可解析配置
            def allFiles = []
            configurations.findAll { it.canBeResolved }.each { cfg ->
                try {
                    cfg.files.each { f ->
                        if (f.exists() && f.name != 'uniapp-v8-release.aar') {
                            allFiles.add(f.absolutePath)
                        }
                    }
                } catch(Exception ignored) {}
            }
            def outFile = file("${buildDir}/dep-files.txt")
            outFile.text = allFiles.unique().join('\n')
            println "Exported ${allFiles.size()} files (fallback mode)"
        }
    }
}
